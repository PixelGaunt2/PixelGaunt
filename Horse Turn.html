<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="generator" content="Made with Gemini AI Pro">
    <title>Horse Turn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            background-color: #87CEEB; /* Day Sky Color */
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            user-select: none;
            touch-action: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #uiLayer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background: rgba(34, 139, 34, 0.7); backdrop-filter: blur(5px);
            transition: opacity 0.3s; z-index: 10;
        }
        .hidden { opacity: 0; pointer-events: none !important; display: none !important; }
        
        h1 { font-size: 4rem; text-shadow: 0 0 20px #000; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 5px; text-align: center; color: #fff;}
        p { font-size: 1.2rem; margin-bottom: 30px; color: #eee; text-align: center; max-width: 500px; line-height: 1.6; text-shadow: 0 2px 4px #000;}
        
        button.main-btn { 
            padding: 15px 45px; font-size: 1.4rem; 
            background: linear-gradient(45deg, #8B4513, #D2691E); color: #fff; border: none; border-radius: 50px; 
            cursor: pointer; font-weight: bold; transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(139, 69, 19, 0.6); text-transform: uppercase;
        }
        button.main-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(210, 105, 30, 0.8); }
        
        #hud { position: absolute; top: 20px; left: 30px; font-size: 1.5rem; font-weight: bold; text-shadow: 0 2px 5px #000; z-index: 5; }
        .hud-coin { color: #FFD700; text-shadow: 0 0 10px #FFA500; }
        
        #controls-hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; font-size: 1.1rem; letter-spacing: 1px; z-index: 5; text-shadow: 0 2px 4px #000;}
        
        /* Dash Button */
        #dashBtn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff0055, #ffaa00);
            color: white;
            font-size: 2rem;
            border: none;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            z-index: 8;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0.8;
            transition: opacity 0.2s, transform 0.1s;
        }
        #dashBtn:active { transform: scale(0.9); opacity: 1; }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            #hud { font-size: 1.1rem; left: 15px; }
            #controls-hint { font-size: 0.9rem; padding: 0 10px; bottom: 35px; text-align: left; left: 15px; width: auto; max-width: 60%; }
            #dashBtn { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="hud">Score: <span id="scoreVal">0</span> | <span class="hud-coin">Coins: <span id="coinVal">0</span></span> | Level: <span id="levelVal">1</span></div>
    <div id="controls-hint">Swipe L/R to Steer | Swipe Up to Jump</div>
    
    <button id="dashBtn" class="hidden">⚡</button>

    <canvas id="gameCanvas"></canvas>

    <div id="uiLayer">
        <h1 id="mainTitle">HORSE TURN</h1>
        <p id="subText">Dodge trees, jump over rocks and holes! Hold Dash to speed up!</p>
        <button id="startBtn" class="main-btn">START RUN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const uiLayer = document.getElementById('uiLayer');
        const startBtn = document.getElementById('startBtn');
        const dashBtn = document.getElementById('dashBtn');
        const scoreHUD = document.getElementById('scoreVal');
        const coinHUD = document.getElementById('coinVal');
        const levelHUD = document.getElementById('levelVal');
        const mainTitle = document.getElementById('mainTitle');
        const subText = document.getElementById('subText');

        let width, height;
        let gameState = 'menu';
        let score = 0;
        let coinsCount = 0;
        let level = 1;
        let baseGameSpeed = 8;
        let gameSpeed = 8;
        let distanceTraveled = 0;

        const R = 160; 
        const FOV = 280; 
        const SLICE_DZ = 50; 
        const MAX_Z = 1600; 
        let cameraAngle = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if(window.innerWidth > 768) {
                document.getElementById('controls-hint').innerText = "Keys L/R Steer | UP Arrow Jump | SHIFT/Btn Dash";
            } else {
                document.getElementById('controls-hint').innerText = "Swipe L/R Steer | Swipe Up Jump | Double Tap Dash";
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // --- SUBWAY SURFER LANE MOVEMENT SYSTEM ---
        function moveLeft() {
            if (gameState !== 'playing' || horse.isFallingOut) return;
            horse.lane--;
            if (horse.lane < 0) {
                horse.wall = (horse.wall + 3) % 4; 
                horse.lane = 2; 
                horse.x += 2 * R; 
            }
        }
        
        function moveRight() {
            if (gameState !== 'playing' || horse.isFallingOut) return;
            horse.lane++;
            if (horse.lane > 2) {
                horse.wall = (horse.wall + 1) % 4; 
                horse.lane = 0; 
                horse.x -= 2 * R; 
            }
        }

        // --- KEYBOARD CONTROLS (PC) ---
        const keys = { Dash: false };
        const pressed = {};
        
        window.addEventListener('keydown', e => {
            if (pressed[e.code]) return;
            pressed[e.code] = true;
            
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft();
            if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight();
            
            if (e.code === 'ArrowUp' || e.code === 'KeyW') { 
                e.preventDefault(); 
                if (gameState === 'playing') horse.jump(); 
            }
            
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.Dash = true;
        });
        
        window.addEventListener('keyup', e => {
            pressed[e.code] = false;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.Dash = false;
        });

        // --- SWIPE & DOUBLE TAP CONTROLS (MOBILE) ---
        let touchStartX = 0;
        let touchStartY = 0;
        let swipeHandled = false;
        let lastTapTime = 0;
        let mobileDashTimer = null;

        window.addEventListener('touchstart', e => {
            if (gameState !== 'playing' || e.target === dashBtn) return;
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            swipeHandled = false;

            const now = Date.now();
            if (now - lastTapTime < 300) {
                keys.Dash = true;
                dashBtn.style.opacity = '1';
                clearTimeout(mobileDashTimer);
                mobileDashTimer = setTimeout(() => { 
                    keys.Dash = false; 
                    dashBtn.style.opacity = '0.8'; 
                }, 3000);
            }
            lastTapTime = now;
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            if (gameState !== 'playing' || e.target === dashBtn || swipeHandled) return;
            e.preventDefault(); 
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) moveRight();
                    else moveLeft();
                } else {
                    if (dy < 0) horse.jump(); 
                }
                swipeHandled = true;
            }
        }, { passive: false });

        dashBtn.addEventListener('mousedown', e => { e.preventDefault(); keys.Dash = true; });
        dashBtn.addEventListener('mouseup', e => { e.preventDefault(); keys.Dash = false; });
        dashBtn.addEventListener('mouseleave', e => { e.preventDefault(); keys.Dash = false; });

        // --- AUDIO ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let actx, bgmInterval;
        function initAudio() { if (!actx) actx = new AudioContext(); if (actx.state === 'suspended') actx.resume(); }
        function playSFX(type) {
            if (!actx) return;
            const osc = actx.createOscillator(), gain = actx.createGain();
            osc.connect(gain); gain.connect(actx.destination);
            if (type === 'jump') {
                osc.frequency.setValueAtTime(200, actx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, actx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.1, actx.currentTime);
                osc.start(); osc.stop(actx.currentTime + 0.15);
            } else if (type === 'fall' || type === 'crash') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, actx.currentTime);
                osc.frequency.linearRampToValueAtTime(30, actx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.2, actx.currentTime);
                osc.start(); osc.stop(actx.currentTime + 0.6);
            } else if (type === 'coin') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, actx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1500, actx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, actx.currentTime);
                osc.start(); osc.stop(actx.currentTime + 0.1);
            }
        }
        function manageBGM(play) {
            clearInterval(bgmInterval);
            if (!play || !actx) return;
            let seq = [147, 165, 196, 220], step = 0;
            bgmInterval = setInterval(() => {
                const osc = actx.createOscillator(), gain = actx.createGain();
                osc.type = 'triangle'; osc.frequency.value = seq[step];
                gain.gain.setValueAtTime(0.03, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + (keys.Dash ? 0.1 : 0.2));
                osc.connect(gain); gain.connect(actx.destination);
                osc.start(); osc.stop(actx.currentTime + 0.2);
                step = (step + 1) % seq.length;
            }, keys.Dash ? 150 : 250); 
        }

        // --- 3D MATH ---
        function getWorldPos(wall, localX, localY) {
            let d = R - localY;
            if (wall === 0) return { x: localX, y: d };     
            if (wall === 1) return { x: d, y: -localX };    
            if (wall === 2) return { x: -localX, y: -d };   
            if (wall === 3) return { x: -d, y: localX };    
        }

        function project3D(pt) {
            const cos = Math.cos(-cameraAngle);
            const sin = Math.sin(-cameraAngle);
            let rx = pt.x * cos - pt.y * sin;
            let ry = pt.x * sin + pt.y * cos;

            if (pt.z <= 0) return null;
            let sx = width / 2 + (rx * FOV) / pt.z;
            let sy = height / 2 + (ry * FOV) / pt.z;
            return { x: sx, y: sy };
        }

        // --- TUNNEL & ENVIRONMENT GENERATION ---
        let slices = [];
        let patternTimer = 0;

        function createSlice(zValue) {
            let slice = { z: zValue, walls: [], coin: null, obstacle: null };
            for(let w=0; w<4; w++) slice.walls.push([true, true, true]); // Initial Solid Ground

            // --- HOLES GENERATION (Gaps) ---
            if (zValue > 600) {
                patternTimer--;
                if (patternTimer <= 0) {
                    let r = Math.random();
                    if (r < 0.25) { 
                        // Small Hole: Missing Lane
                        slice.walls[Math.floor(Math.random() * 4)][Math.floor(Math.random() * 3)] = false;
                    } else if (r < 0.45) { 
                        // Big Hole: Entire Wall Missing
                        slice.walls[Math.floor(Math.random() * 4)] = [false, false, false]; 
                    }
                    patternTimer = Math.floor(Math.random() * 8) + 4; 
                }
            }

            // Get valid lanes (where ground exists)
            let validLanes = [];
            for(let w=0; w<4; w++) {
                for(let l=0; l<3; l++) {
                    if(slice.walls[w][l]) validLanes.push({w, l}); 
                }
            }

            // --- OBSTACLES GENERATION (Rocks/Trees) ---
            if (validLanes.length > 0 && zValue > 600 && Math.random() < 0.25) {
                let chosen = validLanes[Math.floor(Math.random() * validLanes.length)];
                slice.obstacle = {
                    type: Math.random() > 0.5 ? 'tree' : 'rock',
                    wall: chosen.w,
                    lane: chosen.l
                };
            }

            // --- COINS GENERATION ---
            if (validLanes.length > 0 && Math.random() < 0.3) {
                let chosen = validLanes[Math.floor(Math.random() * validLanes.length)];
                // Ensure coin doesn't spawn exactly inside an obstacle
                if (!slice.obstacle || slice.obstacle.lane !== chosen.l || slice.obstacle.wall !== chosen.w) {
                    slice.coin = { wall: chosen.w, lane: chosen.l, collected: false, rot: Math.random() * Math.PI };
                }
            }

            return slice;
        }

        function initTunnel() {
            slices = []; patternTimer = 15;
            for (let z = 100; z < MAX_Z; z += SLICE_DZ) slices.push(createSlice(z));
        }

        function updateTunnel() {
            slices.forEach(s => s.z -= gameSpeed);
            if (slices[0].z < 50) {
                slices.shift();
                slices.push(createSlice(slices[slices.length - 1].z + SLICE_DZ));
            }
        }

        function drawTunnelAndEnvironment() {
            for (let i = slices.length - 1; i >= 0; i--) {
                let slice = slices[i];
                let z1 = slice.z, z2 = slice.z + SLICE_DZ;
                let depthFactor = Math.max(0, Math.min(1, 1 - z1 / MAX_Z));
                let laneWidth = (2 * R) / 3;

                // 1. Draw Grass Path
                for (let w = 0; w < 4; w++) {
                    for (let l = 0; l < 3; l++) {
                        if (!slice.walls[w][l]) continue; // Hides the lane to create a Hole

                        let lx1 = -R + l * laneWidth, lx2 = lx1 + laneWidth;
                        let wP1 = getWorldPos(w, lx1, 0), wP2 = getWorldPos(w, lx2, 0);

                        let p1 = project3D({ x: wP1.x, y: wP1.y, z: z1 });
                        let p2 = project3D({ x: wP2.x, y: wP2.y, z: z1 });
                        let p3 = project3D({ x: wP2.x, y: wP2.y, z: z2 });
                        let p4 = project3D({ x: wP1.x, y: wP1.y, z: z2 });

                        if (!p1 || !p2 || !p3 || !p4) continue;

                        let dashWarp = keys.Dash ? 0.8 : 0.6;
                        ctx.fillStyle = `rgba(34, 139, 34, ${dashWarp * depthFactor})`; 
                        ctx.strokeStyle = `rgba(139, 69, 19, ${(keys.Dash ? 1.0 : 0.7) * depthFactor})`; 
                        ctx.lineWidth = 2;

                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                        ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y);
                        ctx.closePath();
                        ctx.fill(); ctx.stroke();
                    }
                }

                // 2. Draw Obstacles (Rocks / Trees)
                if (slice.obstacle && z1 > 100) {
                    let lx = -R + slice.obstacle.lane * laneWidth + laneWidth/2;
                    let wP = getWorldPos(slice.obstacle.wall, lx, 0); 
                    let p = project3D({ x: wP.x, y: wP.y, z: z1 });
                    
                    if (p) {
                        let scale = FOV / z1;
                        let s = 35 * scale; 
                        
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        let renderAngle = (slice.obstacle.wall * Math.PI / 2) - cameraAngle;
                        ctx.rotate(renderAngle); 
                        
                        if (slice.obstacle.type === 'rock') {
                            ctx.fillStyle = `rgba(100, 100, 100, ${depthFactor})`; 
                            ctx.beginPath();
                            ctx.moveTo(-s*0.8, 0); ctx.lineTo(-s*0.4, -s*0.8);
                            ctx.lineTo(s*0.3, -s*1.1); ctx.lineTo(s*0.9, 0); ctx.fill();
                            ctx.fillStyle = `rgba(70, 70, 70, ${depthFactor})`;
                            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-s*0.4, -s*0.8); ctx.lineTo(s*0.3, -s*1.1); ctx.fill();
                        } else if (slice.obstacle.type === 'tree') {
                            ctx.fillStyle = `rgba(92, 64, 51, ${depthFactor})`; 
                            ctx.fillRect(-s*0.2, -s*0.5, s*0.4, s*0.5);
                            ctx.fillStyle = `rgba(0, 100, 0, ${depthFactor})`; 
                            ctx.beginPath(); ctx.moveTo(-s*1.2, -s*0.5); ctx.lineTo(0, -s*2.5); ctx.lineTo(s*1.2, -s*0.5); ctx.fill();
                            ctx.fillStyle = `rgba(34, 139, 34, ${depthFactor})`; 
                            ctx.beginPath(); ctx.moveTo(-s*0.8, -s*1.2); ctx.lineTo(0, -s*3.5); ctx.lineTo(s*0.8, -s*1.2); ctx.fill();
                        }
                        ctx.restore();
                    }
                }

                // 3. Draw Coins
                if (slice.coin && !slice.coin.collected && z1 > 100) {
                    let lx = -R + slice.coin.lane * laneWidth + laneWidth/2;
                    let wP = getWorldPos(slice.coin.wall, lx, 30); 
                    let p = project3D({ x: wP.x, y: wP.y, z: z1 });
                    
                    if (p) {
                        let scale = FOV / z1;
                        let s = 14 * scale;
                        slice.coin.rot += 0.05; 
                        let spin = Math.cos(slice.coin.rot);
                        
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.scale(spin, 1);
                        
                        ctx.fillStyle = `rgba(255, 215, 0, ${depthFactor})`;
                        ctx.beginPath(); ctx.arc(0, 0, s, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = `rgba(255, 165, 0, ${depthFactor})`;
                        ctx.beginPath(); ctx.arc(0, 0, s*0.6, 0, Math.PI*2); ctx.fill();
                        
                        ctx.restore();
                    }
                }
            }
        }

        // --- SHADOW-FREE HORSE ---
        function drawCustomHorse(ctx, s, cycle) {
            ctx.fillStyle = '#8B4513'; 
            ctx.beginPath(); ctx.ellipse(0, 0, s*0.35, s*0.45, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#A0522D';
            ctx.beginPath(); ctx.ellipse(0, -s*0.45, s*0.2, s*0.25, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#5C4033';
            ctx.beginPath(); ctx.moveTo(-s*0.1, -s*0.65); ctx.lineTo(-s*0.2, -s*0.85); ctx.lineTo(-s*0.05, -s*0.7); ctx.fill();
            ctx.beginPath(); ctx.moveTo(s*0.1, -s*0.65); ctx.lineTo(s*0.2, -s*0.85); ctx.lineTo(s*0.05, -s*0.7); ctx.fill();
            ctx.fillStyle = '#3E2723';
            let tailSway = Math.sin(cycle) * s * 0.4;
            ctx.beginPath(); ctx.moveTo(-s*0.05, s*0.3); ctx.lineTo(tailSway - s*0.1, s*0.8); ctx.lineTo(tailSway + s*0.1, s*0.8); ctx.lineTo(s*0.05, s*0.3); ctx.fill();
            ctx.fillStyle = '#5C4033';
            let legMovement = Math.sin(cycle*2) * s * 0.25;
            ctx.beginPath(); ctx.rect(-s*0.25, s*0.2, s*0.15, s*0.4 + legMovement); ctx.fill();
            ctx.beginPath(); ctx.rect(s*0.1, s*0.2, s*0.15, s*0.4 - legMovement); ctx.fill();
            
            if (keys.Dash) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)'; 
                ctx.beginPath(); ctx.ellipse(0, 0, s*0.5, s*0.6, 0, 0, Math.PI*2); ctx.fill();
            }
        }

        // --- PLAYER MECHANICS ---
        const horse = {
            wall: 0, x: 0, lane: 1, y: 0, vy: 0, z: 220, size: 70,
            isGrounded: true, isFallingOut: false,

            reset() { this.wall = 0; this.lane = 1; this.x = 0; this.y = 0; this.vy = 0; this.isGrounded = true; this.isFallingOut = false; },

            jump() {
                if (this.isGrounded && !this.isFallingOut) {
                    this.vy = 7.0; this.isGrounded = false; playSFX('jump'); // Jump thoda high kiya gaps clear karne k liye
                }
            },

            update() {
                if (this.isFallingOut) {
                    this.y -= 8; 
                    if (this.y < -300) endGame("You fell into the abyss!");
                    return;
                }

                // Snap to Lane
                let targetX = (this.lane - 1) * ((2 * R) / 3);
                this.x += (targetX - this.x) * 0.3; 

                if (!this.isGrounded) {
                    this.y += this.vy; this.vy -= 0.35; 
                    if (this.y <= 0) { this.y = 0; this.vy = 0; this.isGrounded = true; }
                }

                let laneIndex = Math.max(0, Math.min(2, Math.floor((this.x + R) / ((2 * R) / 3))));
                
                slices.forEach(s => {
                    // Hole (Gap) Collision - Check if horse is over a gap and on ground
                    if (s.z <= this.z && s.z + SLICE_DZ > this.z && this.y <= 0) {
                        if (!s.walls[this.wall][laneIndex]) {
                            this.isFallingOut = true; 
                            this.isGrounded = false; 
                            playSFX('fall');
                        }
                    }

                    // Coin Collision
                    if (s.coin && !s.coin.collected && Math.abs(s.z - this.z) < SLICE_DZ) {
                        if (s.coin.wall === this.wall && s.coin.lane === laneIndex && this.y < 60) {
                            s.coin.collected = true;
                            coinsCount++;
                            score += 25; 
                            scoreHUD.innerText = score;
                            coinHUD.innerText = coinsCount;
                            playSFX('coin');
                        }
                    }
                    
                    // Obstacle Collision (Rocks & Trees)
                    if (s.obstacle && Math.abs(s.z - this.z) < SLICE_DZ && !this.isFallingOut) {
                        if (s.obstacle.wall === this.wall && s.obstacle.lane === laneIndex) {
                            let collisionHeight = s.obstacle.type === 'tree' ? 120 : 50; 
                            if (this.y < collisionHeight) {
                                this.isFallingOut = true; 
                                this.isGrounded = false; 
                                playSFX('crash');
                                endGame("You hit an obstacle!");
                            }
                        }
                    }
                });
            },

            draw() {
                let wPos = getWorldPos(this.wall, this.x, this.y);
                let pProj = project3D({ x: wPos.x, y: wPos.y, z: this.z });
                if (!pProj) return;

                ctx.save();
                ctx.translate(pProj.x, pProj.y);

                let sizeScale = FOV / this.z;
                let activeSize = this.size * sizeScale;
                let renderAngle = (this.wall * Math.PI / 2) - cameraAngle;
                
                ctx.rotate(renderAngle);
                
                let jumpOffset = this.y > 0 ? -this.y * sizeScale * 1.2 : 0;
                let runCycle = distanceTraveled * 0.15;
                let bounce = this.y > 0 ? 0 : Math.abs(Math.sin(runCycle * (keys.Dash ? 3 : 2))) * activeSize * 0.1;
                
                ctx.translate(0, jumpOffset - bounce);
                drawCustomHorse(ctx, activeSize, runCycle);
                ctx.restore();
            }
        };

        // --- GAME LOOP ---
        function updateCamera() {
            let targetAngle = horse.wall * (Math.PI / 2);
            let diff = targetAngle - cameraAngle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            cameraAngle += diff * (keys.Dash ? 0.18 : 0.12); 
        }

        function startGame() {
            initAudio(); gameState = 'playing'; 
            uiLayer.classList.add('hidden');
            dashBtn.classList.remove('hidden'); 
            
            score = 0; coinsCount = 0; level = 1; baseGameSpeed = 8; distanceTraveled = 0;
            scoreHUD.innerText = score; coinHUD.innerText = coinsCount; levelHUD.innerText = level;
            
            horse.reset(); initTunnel(); manageBGM(true); loop();
        }

        function endGame(reasonStr) {
            gameState = 'gameover'; manageBGM(false); 
            uiLayer.classList.remove('hidden');
            dashBtn.classList.add('hidden'); 
            
            mainTitle.innerText = "GAME OVER"; mainTitle.style.color = "#ff3333";
            
            if(!reasonStr) reasonStr = "You fell into the abyss!";
            subText.innerHTML = `${reasonStr}<br><br><b>Final Score:</b> ${score} | <b>Coins:</b> ${coinsCount} | <b>Level:</b> ${level}`;
            startBtn.innerText = "RUN AGAIN";
            keys.Dash = false; 
            clearTimeout(mobileDashTimer);
        }

        function loop() {
            if (gameState !== 'playing') return;
            
            gameSpeed = keys.Dash ? baseGameSpeed * 2.2 : baseGameSpeed;
            
            // Sky Background
            ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, width, height);

            updateTunnel(); drawTunnelAndEnvironment();
            horse.update(); horse.draw(); updateCamera();

            distanceTraveled += gameSpeed;
            if (Math.floor(distanceTraveled) % 12 === 0) {
                score += 5; scoreHUD.innerText = score;
                
                // SPEED & LEVEL PROGRESSION: Tezi se level barhega (har 500 score par)
                if (score > 0 && score % 500 === 0) {
                    level++; 
                    baseGameSpeed += 1.5; // Speed multiplier barha diya gaya hai
                    levelHUD.innerText = level;
                }
            }
            requestAnimationFrame(loop);
        }

        startBtn.addEventListener('click', startGame);
        startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });
    </script>
</body>
</html>
