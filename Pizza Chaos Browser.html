<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pizza Chaos: Multi-Boss Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #27ae60; 
            font-family: 'Press Start 2P', cursive; color: white;
            touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none;
        }
        
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            object-fit: contain; 
        }

        
        #portrait-lock { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: #1a4a22; z-index: 99999; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        @media screen and (orientation: portrait) { #portrait-lock { display: flex; } }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85); z-index: 10; display: none; text-align: center;
        }
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            pointer-events: none; z-index: 5; display: flex; justify-content: space-between;
            text-shadow: 2px 2px 0 #000; font-size: 14px;
        }
        .hud-left, .hud-right { display: flex; flex-direction: column; gap: 8px; }
        
        .bar-container { width: 200px; height: 15px; background: #333; border: 2px solid #fff; border-radius: 5px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #health-fill { width: 100%; height: 100%; background: #e74c3c; transition: width 0.2s; }
        #xp-fill { width: 0%; height: 100%; background: #f1c40f; transition: width 0.2s; }
        #target-fill { width: 0%; height: 100%; background: #3498db; transition: width 0.2s; }
        
        h1 { color: #f1c40f; text-shadow: 4px 4px 0 #c0392b; margin-bottom: 10px; font-size: 30px; animation: pulse 1s infinite alternate;}
        h2 { color: #ecf0f1; margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
        h3 { color: #fff; font-size: 12px; margin-bottom: 10px;}

        @keyframes pulse { 0% {transform: scale(1) rotate(-2deg);} 100% {transform: scale(1.1) rotate(2deg);} }
        
        .btn-group { display: flex; gap: 15px; margin-top: 20px;}
        button {
            background: #e67e22; color: white; font-family: 'Press Start 2P', cursive;
            padding: 12px 20px; border: 3px solid #fff; border-radius: 10px;
            cursor: pointer; font-size: 12px; text-transform: uppercase;
            box-shadow: 0 4px 0 #d35400; transition: all 0.1s;
        }
        button:hover { background: #f1c40f; transform: translateY(2px); box-shadow: 0 2px 0 #d35400; color: #c0392b; }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 #d35400; }
        .boy-btn { background: #3498db; box-shadow: 0 4px 0 #2980b9; }
        .girl-btn { background: #fd79a8; box-shadow: 0 4px 0 #e84393; }

        .upgrade-cards { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
        .card {
            background: #2c3e50; border: 3px solid #f1c40f; border-radius: 10px; padding: 15px;
            width: 150px; cursor: pointer; transition: transform 0.2s;
        }
        .card:hover { transform: scale(1.05); background: #34495e; box-shadow: 0 0 10px #f1c40f;}
        .card h3 { color: #f1c40f; font-size: 10px; margin-top: 0; line-height: 1.4; }
        .card p { font-size: 8px; line-height: 1.6; }

        #mobile-ui { display: none; position: absolute; top:0; left:0; width: 100%; height: 100%; pointer-events: none; z-index: 20; }
        .joystick-base { position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px; border-radius: 50%; background: rgba(0,0,0,0.3); border: 3px solid rgba(255,255,255,0.4); display: block !important; margin: 0; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .joystick-stick { position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; margin-top: -30px; margin-left: -30px; border-radius: 50%; background: rgba(255,255,255,0.8); box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: transform 0.05s; }
        .mobile-btn { position: absolute; pointer-events: auto; border: 4px solid rgba(255,255,255,0.5); color: white; border-radius: 50%; font-family: 'Press Start 2P', cursive; display: flex; justify-content: center; align-items: center; text-shadow: 2px 2px 0 #000; font-size: 11px; font-weight: bold; box-shadow: 0 6px 10px rgba(0,0,0,0.4); width: 80px; height: 80px; }
        .mobile-btn:active { background: rgba(255,255,255,0.7) !important; transform: scale(0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        #m-dash { bottom: 40px; right: 150px; background: rgba(230, 126, 34, 0.6); }
        #m-jump { bottom: 40px; right: 40px; background: rgba(52, 152, 219, 0.6); }
    
        @media screen and (max-width: 900px) {
            #hud { font-size: 8px; top: 5px; left: 5px; right: 5px; }
            .bar-container { width: 100px; height: 10px; border-width: 1px; }
            h1 { font-size: 24px !important; margin-bottom: 5px; }
            h2 { font-size: 10px; margin-bottom: 10px; }
            button { padding: 8px 12px; font-size: 9px; }
            .card { width: 120px; padding: 10px; }
            .card h3 { font-size: 8px; }
            .card p { font-size: 7px; }
        }
</style>
</head>
<body>

    <div id="portrait-lock">
        <h1 style="font-size: 50px;">導</h1>
        <h2>Please Rotate Your Phone<br>to Landscape Mode</h2>
    </div>

    <div id="mobile-ui">
        <div id="joystick-base" class="joystick-base"><div id="joystick-stick" class="joystick-stick"></div></div>
        <div id="m-dash" class="mobile-btn">DASH</div>
        <div id="m-jump" class="mobile-btn">JUMP</div>
    </div>

    
    <div id="top-controls" style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 50; display: none; gap: 10px;">
        <button id="btn-pause" onclick="togglePause()" style="padding: 8px 12px; font-size: 10px; background: #e67e22;">竢ｸ PAUSE</button>
        <button id="btn-sound" onclick="toggleSound()" style="padding: 8px 12px; font-size: 10px; background: #3498db;">矧 SOUND</button>
    </div>

    <div id="hud">
        <div class="hud-left">
            <div>HP: <span id="hp-text">100/100</span></div>
            <div class="bar-container"><div id="health-fill"></div></div>
            <div>LVL: <span id="lvl-text">1</span></div>
            <div class="bar-container"><div id="xp-fill"></div></div>
            <div style="font-size: 10px; margin-top: 5px;">Level <span id="camp-lvl">1</span> | <span id="target-desc">Target</span></div>
            <div class="bar-container"><div id="target-fill"></div></div>
        </div>
        <div class="hud-right">
            <div>SCORE: <span id="score">0</span></div>
            <div>TIME: <span id="timer">00:00</span></div>
            <div>DASH: <span id="dash-status">READY</span></div>
        </div>
    </div>

    <div id="main-menu" class="screen" style="display: flex;">
        <h1 style="font-size: 40px;">PIZZA CHAOS</h1>
        <h2>25 Levels Multi-Boss Campaign!</h2>
        <div class="btn-group">
            <button class="boy-btn" onclick="startGame('boy')">Play Boy Pizza</button>
            <button class="girl-btn" onclick="startGame('girl')">Play Girl Pizza</button>
        </div>
    </div>

    <div id="pause-screen" class="screen">
        <h1 style="color: #f1c40f;">PAUSED</h1>
        <div class="btn-group">
            <button onclick="togglePause()">笆ｶ Resume</button>
            <button onclick="backToTitle()" style="background: #e74c3c; box-shadow: 0 4px 0 #c0392b;">匠 Back to Title</button>
        </div>
    </div>

    <div id="level-up-screen" class="screen">
        <h1 style="color: #f1c40f; text-shadow: 4px 4px 0 #e67e22;">LEVEL UP!</h1>
        <div class="upgrade-cards" id="upgrade-container"></div>
    </div>

    <div id="level-end-screen" class="screen">
        <h1 style="color: #2ecc71; text-shadow: 4px 4px 0 #27ae60;">LEVEL CLEARED!</h1>
        <h2>Time: <span id="end-time"></span> | Score: <span id="end-score"></span></h2>
        <h2 id="next-level-target">Next Target</h2>
        <button onclick="startCampaignLevel()">Start Next Level</button>
    </div>

    <div id="game-over-screen" class="screen">
        <h1 style="color: #e74c3c; text-shadow: 4px 4px 0 #c0392b;">BAKED!</h1>
        <h2>Reached Level <span id="fail-level"></span><br>Score: <span id="fail-score"></span></h2>
        <button onclick="location.reload()">Back to Oven</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window);
        let gameZoom = isMobile ? 1.8 : 1; // 1.8x zoom out for mobile, makes map 80% bigger
        let width = canvas.width = window.innerWidth * gameZoom;
        let height = canvas.height = window.innerHeight * gameZoom;

        if(isMobile) { document.getElementById('mobile-ui').style.display = 'block'; }

        // --- DYNAMIC 25 LEVELS DATA WITH MULTIPLE BOSSES ---
        const levelObjectives = {};
        const bgList = ['checkers', 'jungle', 'beach', 'ash', 'mesa', 'crystal', 'marsh', 'toxic', 'ruins', 'chaos'];
        
        for(let i=1; i<=25; i++) {
            let bg = bgList[(i-1) % 10];
            if(i === 5) levelObjectives[i] = { type: 'boss_kill', target: 2, bosses: ['bread_boss', 'veggie_boss'], desc: "Kill Bread & Veggie Bosses!", bg: bg };
            else if(i === 10) levelObjectives[i] = { type: 'boss_kill', target: 2, bosses: ['meat_boss', 'cheese_boss'], desc: "Kill Meat & Cheese Bosses!", bg: bg };
            else if(i === 15) levelObjectives[i] = { type: 'boss_kill', target: 3, bosses: ['bread_boss', 'meat_boss', 'veggie_boss'], desc: "Kill 3 Different Bosses!", bg: bg };
            else if(i === 20) levelObjectives[i] = { type: 'boss_kill', target: 4, bosses: ['cheese_boss', 'meat_boss', 'bread_boss', 'veggie_boss'], desc: "Kill All 4 Bosses!", bg: bg };
            else if(i === 25) levelObjectives[i] = { type: 'boss_kill_final', target: 3, bosses: ['supreme_boss', 'bread_boss', 'cheese_boss'], desc: "Kill Supreme Boss & Guards!", bg: bg };
            else {
                let typeMod = i % 4;
                if(typeMod === 1) levelObjectives[i] = { type: 'cheese', target: 15 + i*5, desc: `Collect ${15 + i*5} Cheese`, bg: bg };
                else if(typeMod === 2) levelObjectives[i] = { type: 'survival', target: 60 + i*2, desc: `Survive for ${60 + i*2} Secs`, bg: bg };
                else if(typeMod === 3) levelObjectives[i] = { type: 'pepperoni', target: 10 + i*3, desc: `Collect ${10 + i*3} Pepperoni`, bg: bg };
                else levelObjectives[i] = { type: 'kill_any', target: 20 + i*5, desc: `Kill ${20 + i*5} Enemies`, bg: bg };
            }
        }

        const backgroundThemes = {
            checkers: { base: '#ecf0f1', grid: 'rgba(231, 76, 60, 0.2)' }, jungle: { base: '#1a4a22', grid: 'rgba(39, 174, 96, 0.3)' },
            beach: { base: '#f1c40f', grid: 'rgba(52, 152, 219, 0.1)' }, ash: { base: '#34495e', grid: 'rgba(231, 76, 60, 0.1)' },
            mesa: { base: '#e67e22', grid: 'rgba(44, 62, 80, 0.1)' }, crystal: { base: '#fd79a8', grid: 'rgba(0, 255, 255, 0.2)' },
            marsh: { base: '#2d3436', grid: 'rgba(39, 174, 96, 0.1)' }, toxic: { base: '#2ecc71', grid: 'rgba(155, 89, 182, 0.2)' },
            ruins: { base: '#95a5a6', grid: 'rgba(44, 62, 80, 0.3)' }, chaos: { base: '#2c3e50', grid: 'rgba(255, 255, 255, 0.1)' }
        };

        let audioCtx; let bgmInterval;
        function initAudio() { try { if(!audioCtx) { const AudioContext = window.AudioContext || window.webkitAudioContext; if(AudioContext) { audioCtx = new AudioContext(); startBGM(); } } if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); } catch(e) {} }
        function playTone(freq, type, duration, vol=0.1, slideFreq=null) { if(!audioCtx) return; try { let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); osc.type = type; osc.connect(gain); gain.connect(audioCtx.destination); osc.frequency.setValueAtTime(freq, audioCtx.currentTime); if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration); gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration); osc.start(); osc.stop(audioCtx.currentTime + duration); } catch(e) {} }
        const sfx = { shoot: () => playTone(600, 'square', 0.1, 0.05, 200), hit: () => playTone(150, 'sawtooth', 0.15, 0.1, 50), xp: () => playTone(800, 'sine', 0.1, 0.05, 1200), dash: () => playTone(300, 'sine', 0.2, 0.1, 100), powerup: () => playTone(900, 'triangle', 0.5, 0.1, 100), nuke: () => { playTone(100, 'sawtooth', 1.0, 0.3, 20); playTone(50, 'square', 1.0, 0.3, 10); }, levelUp: () => { setTimeout(() => playTone(400, 'square', 0.15, 0.1), 0); setTimeout(() => playTone(500, 'square', 0.15, 0.1), 150); setTimeout(() => playTone(600, 'square', 0.3, 0.1), 300); }, playerHit: () => playTone(100, 'square', 0.3, 0.2, 50), bounce: () => playTone(250, 'sine', 0.1, 0.02, 350) };
        function startBGM() { let noteIndex = 0; const bassNotes = [130, 130, 174.61, 196.00]; bgmInterval = setInterval(() => { if(!gameState.isPaused && gameState.isRunning && audioCtx) { playTone(bassNotes[noteIndex % 4], 'triangle', 0.2, 0.05); noteIndex++; } }, 200); }

        const gameState = { isRunning: false, isPaused: false, score: 0, time: 0, cameraX: 0, cameraY: 0, shakeTime: 0, nukeFlashTime: 0, freezeFlashTime: 0, charGender: 'boy', campaignLevel: 1, targetAchieved: 0, targetAchievedAlt: 0, bossSpawned: false };
        const keys = { w: false, a: false, s: false, d: false, Shift: false, ' ': false, q: false };
        const mouse = { x: width/2, y: height/2, leftDown: false };

        let joyActive = false, joyOrigin = {x:0, y:0}, joyCurrent = {x:0, y:0};
        const joyBase = document.getElementById('joystick-base'); const joyStick = document.getElementById('joystick-stick');
        function updateJoy(tx, ty) {
            if (!joyBase) return;
            let rect = joyBase.getBoundingClientRect();
            joyOrigin = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
            let dx = tx - joyOrigin.x; let dy = ty - joyOrigin.y;
            let d = Math.hypot(dx, dy); let maxDist = 45;
            if(d > maxDist) { dx = (dx/d)*maxDist; dy = (dy/d)*maxDist; }
            joyStick.style.transform = `translate(${dx}px, ${dy}px)`;
            joyCurrent = { x: joyOrigin.x + dx, y: joyOrigin.y + dy };
        }

        window.addEventListener('touchstart', e => { 
            if(e.target.tagName === 'BUTTON' || e.target.className.includes('mobile-btn')) return; 
            for(let t of e.changedTouches) { 
                if(t.clientX < width/2 && gameState.isRunning && !gameState.isPaused) { 
                    joyActive = true; 
                    updateJoy(t.clientX, t.clientY);
                } 
            } 
        }, {passive: false});
        
        window.addEventListener('touchmove', e => { 
            for(let t of e.changedTouches) { 
                if(joyActive && t.clientX < width) { 
                    updateJoy(t.clientX, t.clientY);
                } 
            } 
        }, {passive: false});
        
        window.addEventListener('touchend', e => { 
            for(let t of e.changedTouches) { 
                if(joyActive) { 
                    joyActive = false; 
                    joyStick.style.transform = `translate(0px, 0px)`; 
                    joyCurrent = {x: joyOrigin.x, y: joyOrigin.y};
                } 
            } 
        });
        document.getElementById('m-dash').addEventListener('touchstart', (e) => { e.preventDefault(); if(player && player.dashCd <= 0 && !player.isDashing && !player.isJumping) player.dash(); });
        document.getElementById('m-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if(player && player.jumpCd <= 0 && !player.isDashing && !player.isJumping) player.jump(); });

        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; if(e.key === 'Shift') keys.Shift = true; if(e.key === ' ') keys[' '] = true; if(e.key.toLowerCase() === 'q') keys.q = true; if(e.key === 'Escape') togglePause(); });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; if(e.key === 'Shift') keys.Shift = false; if(e.key === ' ') keys[' '] = false; if(e.key.toLowerCase() === 'q') keys.q = false; });
        window.addEventListener('mousemove', e => { mouse.x = e.clientX * gameZoom; mouse.y = e.clientY * gameZoom; });
        window.addEventListener('mousedown', e => { if(e.button === 0) mouse.leftDown = true; });
        window.addEventListener('mouseup', e => { if(e.button === 0) mouse.leftDown = false; });
        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth * gameZoom; height = canvas.height = window.innerHeight * gameZoom; });

        const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

        let isMuted = false;
        function toggleSound() {
            isMuted = !isMuted;
            const btn = document.getElementById('btn-sound');
            btn.innerText = isMuted ? '這 MUTED' : '矧 SOUND';
            btn.style.background = isMuted ? '#95a5a6' : '#3498db';
            if (audioCtx) {
                if (isMuted) audioCtx.suspend();
                else audioCtx.resume();
            }
        }
        function backToTitle() {
            gameState.isRunning = false;
            gameState.isPaused = false;
            document.getElementById('pause-screen').style.display = 'none';
            document.getElementById('top-controls').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            if(typeof gameTimerInterval !== 'undefined') clearInterval(gameTimerInterval);
            if(typeof bgmInterval !== 'undefined') clearInterval(bgmInterval);
        }


        
        function triggerElectricShock() {
            screenShake(10);
            if (!isMuted && sfx.powerup) sfx.powerup(); 
            enemies.forEach(e => {
                if (dist(player.x, player.y, e.x, e.y) < 300) { 
                    e.hp -= 40 * player.dmgMult;
                    e.speedMult = 0; 
                    setTimeout(() => e.speedMult = 1, 2500); 
                    entities.push(new Lightning(player.x, player.y, e.x, e.y));
                }
            });
        }
        
        class WindTornado {
            constructor(x, y) { this.x = x; this.y = y; this.life = 6; this.angle = 0; }
            update(dt) {
                this.life -= dt;
                this.angle += dt * 8;
                // Slowly follow player
                this.x += (player.x - this.x) * dt * 2;
                this.y += (player.y - this.y) * dt * 2;
                // Pull and damage enemies
                enemies.forEach(e => {
                    let d = Math.hypot(this.x - e.x, this.y - e.y);
                    if (d < 300) { // Vacuum radius
                        let pullAngle = Math.atan2(this.y - e.y, this.x - e.x);
                        e.x += Math.cos(pullAngle) * 150 * dt;
                        e.y += Math.sin(pullAngle) * 150 * dt;
                        if(Math.random() < 0.1) { e.hp -= 20 * player.dmgMult; screenShake(2); }
                    }
                });
            }
            draw(ctx) {
                if(this.life <= 0) return;
                let drawX = this.x - gameState.cameraX, drawY = this.y - gameState.cameraY;
                ctx.save(); ctx.translate(drawX, drawY); ctx.rotate(this.angle);
                ctx.strokeStyle = '#bdc3c7'; ctx.lineWidth = 5;
                ctx.shadowBlur = 10; ctx.shadowColor = '#ecf0f1';
                for(let i=0; i<4; i++) {
                    ctx.beginPath(); 
                    ctx.arc(0, 0, 20 + i*25 + Math.sin(this.life*10)*10, 0, Math.PI*1.5); 
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        class FireRing {
            constructor(x, y) { this.x = x; this.y = y; this.life = 4; this.radius = 10; }
            update(dt) {
                this.life -= dt;
                this.x = player.x; this.y = player.y; // Follow player
                this.radius += 100 * dt; // Expands outward quickly
                if (this.radius > 400) this.radius = 10; // Pulsing effect
                enemies.forEach(e => {
                    let d = Math.hypot(this.x - e.x, this.y - e.y);
                    if (Math.abs(d - this.radius) < 40) { // If touches the expanding ring
                        e.hp -= 30 * player.dmgMult;
                        screenShake(3);
                    }
                });
            }
            draw(ctx) {
                if(this.life <= 0) return;
                let drawX = this.x - gameState.cameraX, drawY = this.y - gameState.cameraY;
                ctx.save(); ctx.translate(drawX, drawY);
                ctx.strokeStyle = '#e74c3c'; ctx.lineWidth = 15 + Math.sin(this.life*20)*8;
                ctx.shadowBlur = 25; ctx.shadowColor = '#e67e22';
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.stroke();
                ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 5;
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            }
        }

        class Lightning {
            constructor(x1, y1, x2, y2) { this.x1 = x1; this.y1 = y1; this.x2 = x2; this.y2 = y2; this.life = 0.3; }
            update(dt) { this.life -= dt;

            // Wind Vacuum Logic
            if (this.type === 'wind' || this.type === 'tornado') {
                enemies.forEach(e => {
                    let d = dist(this.x, this.y, e.x, e.y);
                    if (d < 200) { // Vacuum radius
                        let angle = Math.atan2(this.y - e.y, this.x - e.x);
                        // Pull enemy towards wind at 50% speed
                        e.x += Math.cos(angle) * (e.speed * 0.5) * dt;
                        e.y += Math.sin(angle) * (e.speed * 0.5) * dt;
                    }
                });
            }
 }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save(); ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 3; ctx.shadowBlur = 15; ctx.shadowColor = '#00ffff';
                ctx.beginPath(); ctx.moveTo(this.x1 - gameState.cameraX, this.y1 - gameState.cameraY);
                let midX = (this.x1 + this.x2) / 2 + (Math.random() - 0.5) * 60;

            if(!gameState.isRunning || gameState.isPaused || document.getElementById('level-end-screen').style.display === 'flex') return;
            const objective = levelObjectives[gameState.campaignLevel];
            
            // Multiple Boss Spawning Logic
            if (objective.type.includes('boss_kill') && !gameState.bossSpawned) { 
                objective.bosses.forEach((bossType, index) => {
                    let angle = (Math.PI * 2 / objective.bosses.length) * index;
                    let ex = player.x + Math.cos(angle) * 400; let ey = player.y + Math.sin(angle) * 400;
                    enemies.push(new Enemy(ex, ey, bossType)); 
                });
                gameState.bossSpawned = true; 
                return; 
            }
            if(gameState.bossSpawned && objective.type.includes('boss')) return; // Stop regular spawn during boss fights
            
            let wavePool = ['ketchup'];
            if(gameState.campaignLevel > 2) wavePool.push('pepper');
            if(gameState.campaignLevel > 6) wavePool.push('slice');

            let count = 2 + Math.floor(gameState.campaignLevel / 2) + Math.floor(gameState.time / 60);
            for(let i=0; i<count; i++) {
                let angle = Math.random() * Math.PI * 2; let r = Math.max(width, height) / 2 + 100;
                let type = wavePool[Math.floor(Math.random() * wavePool.length)]; enemies.push(new Enemy(player.x + Math.cos(angle) * r, player.y + Math.sin(angle) * r, type));
            }
        }

        }

            let allRenderables = [player, ...enemies, ...items, ...entities].sort((a,b) => a.y - b.y); allRenderables.forEach(r => r.draw(ctx));

            particles = particles.filter(p => p.life > 0); particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.03; let safeRadius = Math.max(0.1, 4 * p.life); ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, safeRadius, 0, Math.PI*2); ctx.fill(); }); ctx.globalAlpha = 1;
            texts = texts.filter(t => t.life > 0); texts.forEach(t => { t.y -= 1.5; t.life -= 0.02; t.scale += (1 - t.scale) * 0.2; ctx.globalAlpha = Math.max(0, t.life); ctx.fillStyle = t.color; let safeScale = Math.max(1, 14 * t.scale); ctx.font = `bold ${safeScale}px "Press Start 2P"`; ctx.fillText(t.txt, t.x - 10, t.y); }); ctx.restore();

            if(gameState.nukeFlashTime > 0) { gameState.nukeFlashTime -= dt; ctx.fillStyle = `rgba(255, 255, 255, ${gameState.nukeFlashTime * 2})`; ctx.fillRect(0, 0, width, height); }
            if(gameState.freezeFlashTime > 0) { gameState.freezeFlashTime -= dt; ctx.fillStyle = `rgba(0, 255, 255, ${gameState.freezeFlashTime * 2})`; ctx.fillRect(0, 0, width, height); }
        }

        function startGame(gender) {
            gameState.charGender = gender; initAudio(); document.getElementById('main-menu').style.display = 'none';
            document.getElementById('top-controls').style.display = 'flex';
            player = new Player(gender); entities = []; enemies = []; items = []; texts = []; particles = [];
            gameState.isRunning = true; generateObstacles(); gameState.isPaused = false; gameState.score = 0; gameState.time = 0;
            gameState.campaignLevel = 1; gameState.targetAchieved = 0; gameState.bossSpawned = false;
            document.getElementById('score').innerText = '0'; lastTime = Date.now(); setInterval(spawnWave, 2000); 
            gameTimerInterval = setInterval(() => {
                if(gameState.isPaused || !gameState.isRunning || document.getElementById('level-end-screen').style.display === 'flex') return;
                gameState.time++; let m = Math.floor(gameState.time / 60).toString().padStart(2, '0'); let s = (gameState.time % 60).toString().padStart(2, '0'); document.getElementById('timer').innerText = `${m}:${s}`;
                const objective = levelObjectives[gameState.campaignLevel]; if (objective.type === 'survival') { gameState.targetAchieved = gameState.time; checkLevelComplete(); }
            }, 1000);
            player.updateUI(); loop();
        }

        function startCampaignLevel() {
            entities = []; enemies = []; items = []; texts = []; particles = [];
            gameState.targetAchieved = 0; gameState.time = 0; gameState.bossSpawned = false; gameState.isPaused = false;
            lastTime = Date.now(); document.getElementById('level-end-screen').style.display = 'none';
            player.hp = player.maxHp; player.updateUI();
        }

        function togglePause() {
            if(!gameState.isRunning || document.getElementById('level-up-screen').style.display === 'flex' || document.getElementById('level-end-screen').style.display === 'flex') return;
            gameState.isPaused = !gameState.isPaused; document.getElementById('pause-screen').style.display = gameState.isPaused ? 'flex' : 'none'; if(!gameState.isPaused) lastTime = Date.now(); 
        }

        const upgradePool = [
            { name: "Sriracha", desc: "Attacks burn", apply: () => { player.fireLevel++; } }, { name: "Ice Water", desc: "Attacks slow", apply: () => { player.waterLevel++; } },
            { name: "Extra Dough", desc: "+20 Max HP", apply: () => { player.maxHp += 20; player.hp += 20; } }, { name: "Roller Cutter", desc: "+15% Speed", apply: () => { player.speedMult += 0.15; } }, 
            { name: "Spicy Sauce", desc: "+25% Damage", apply: () => { player.dmgMult += 0.25; } }, { name: "Espresso", desc: "Fast Fire", apply: () => { player.fireRateMult += 0.3; } }, 
            { name: "Double", desc: "+1 Projectile", apply: () => { player.projectiles += 1; } }, { name: "Tips Magnet", desc: "Larger Range", apply: () => { player.magnetRange += 30; } }, 
            { name: "Deep Dish", desc: "Big Projectile", apply: () => { player.projSizeMult += 0.3; } }
        ];

        function triggerLevelUp() {
            gameState.isPaused = true; sfx.levelUp(); for(let i=0; i<30; i++) spawnParticle(player.x, player.y, '#f1c40f', 8);
            let screen = document.getElementById('level-up-screen'); let container = document.getElementById('upgrade-container'); container.innerHTML = '';
            let shuffled = [...upgradePool].sort(() => 0.5 - Math.random()); let choices = shuffled.slice(0, 3);
            choices.forEach(u => { let card = document.createElement('div'); card.className = 'card'; card.innerHTML = `<h3>${u.name}</h3><p>${u.desc}</p>`; card.onclick = () => { u.apply(); player.updateUI(); player.pendingLevelUps--; if (player.pendingLevelUps > 0) triggerLevelUp(); else { screen.style.display = 'none'; gameState.isPaused = false; lastTime = Date.now(); } }; container.appendChild(card); });
            screen.style.display = 'flex';
        }

        function triggerLevelEnd() {
            gameState.isPaused = true; sfx.powerup(); for(let i=0; i<50; i++) spawnParticle(player.x, player.y, '#2ecc71', 12); spawnText(player.x, player.y - 40, 'LEVEL END!', '#2ecc71');
            let m = Math.floor(gameState.time / 60).toString().padStart(2, '0'); let s = (gameState.time % 60).toString().padStart(2, '0'); document.getElementById('end-time').innerText = `${m}:${s}`; document.getElementById('end-score').innerText = gameState.score;
            if (gameState.campaignLevel < 25) { let nextObj = levelObjectives[gameState.campaignLevel + 1]; document.getElementById('next-level-target').innerText = `Next: ${nextObj.desc}`; gameState.campaignLevel++; generateObstacles(); } else { document.getElementById('next-level-target').innerText = "Campaign Complete!"; }
            document.getElementById('level-end-screen').style.display = 'flex';
        }

        function triggerGameOver() { gameState.isRunning = false; clearInterval(gameTimerInterval); document.getElementById('fail-level').innerText = gameState.campaignLevel; document.getElementById('fail-score').innerText = gameState.score; document.getElementById('game-over-screen').style.display = 'flex'; }
    </script>
</body>
</html>
