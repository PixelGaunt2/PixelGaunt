<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Serpent Relic 3.2: Max Performance</title>
<style>
    :root {
        --bg: #030305;
        --text: #e0eaff;
        --neon-primary: #00f3ff;
        --neon-secondary: #ff00ea;
        --neon-twin: #ff8800;
        --neon-danger: #ff003c;
        --neon-success: #00ff66;
        --neon-warn: #ffea00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    @keyframes bgPulse {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    body {
        background: #050508;
        color: var(--text);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
        contain: layout style paint; width: 100vw; height: 100vh;
        display: flex; justify-content: center; align-items: center;
    }
    #gameContainer {
        position: relative; width: 100%; height: 100%; max-width: 900px; max-height: 900px;
        background: radial-gradient(circle at center, rgba(17,17,24,0.8) 0%, rgba(3,3,5,0.9) 100%);
        box-shadow: 0 0 50px rgba(0, 243, 255, 0.15), inset 0 0 30px rgba(0, 243, 255, 0.05);
        border: 1px solid rgba(0, 243, 255, 0.1);
        overflow: hidden;
        contain: layout style paint;
    }
    canvas { 
        display: block; 
        width: 100%; 
        height: 100%; 
        image-rendering: pixelated;
        transform: translateZ(0);
        backface-visibility: hidden;
    }
    
    .screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        background: rgba(5, 5, 8, 0.6); 
        z-index: 10; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 0; pointer-events: none; transform: scale(1.05);
    }
    .screen.active { opacity: 1; pointer-events: auto; transform: scale(1); }
    
    h1 {
        font-size: 4rem; margin-bottom: 1rem; color: #fff;
        text-shadow: 0 0 20px var(--neon-primary);
        text-align: center; text-transform: uppercase; letter-spacing: 8px; font-weight: 900;
    }
    h2 {
        font-size: 2.5rem; margin-bottom: 1rem; color: #fff;
        text-shadow: 0 0 15px var(--neon-secondary);
        letter-spacing: 4px;
    }
    p { margin-bottom: 2.5rem; text-align: center; max-width: 70%; line-height: 1.6; font-size: 1.1rem; color: #aaa; }
    
    .btn {
        background: rgba(0, 243, 255, 0.05); color: var(--neon-primary);
        border: 1px solid var(--neon-primary); padding: 15px 45px;
        font-size: 1.1rem; font-weight: bold; cursor: pointer;
        text-transform: uppercase; letter-spacing: 3px; margin: 10px;
        border-radius: 4px; transition: all 0.3s ease; position: relative; overflow: hidden;
        contain: layout style paint;
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
    }
    .btn:hover {
        background: var(--neon-primary); color: var(--bg);
        box-shadow: 0 0 30px var(--neon-primary); transform: translateY(-2px);
    }
    .btn-continue { border-color: var(--neon-success); color: var(--neon-success); box-shadow: 0 0 15px rgba(0, 255, 102, 0.1); }
    .btn-continue:hover { background: var(--neon-success); color: var(--bg); box-shadow: 0 0 30px var(--neon-success); }
    
    #hud {
        position: absolute; top: 0; left: 0; width: 100%; padding: 20px 30px;
        display: flex; justify-content: space-between; pointer-events: none; z-index: 5;
    }
    .hud-block { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(0,243,255,0.2);  }
    .hud-text { font-size: 1.1rem; color: #fff; text-shadow: 0 0 8px var(--neon-primary); font-weight: bold; letter-spacing: 2px; }
    #controls-hud { pointer-events: auto; }
    #btnPause, #btnRestart, #btnActionHUD { cursor: pointer; transition: 0.2s; padding: 5px; border-radius: 4px; }
    #btnPause:hover, #btnRestart:hover, #btnActionHUD:hover { background: rgba(255,255,255,0.1); text-shadow: 0 0 15px #fff; }
    
    .level-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 15px;
        width: 80%; max-height: 55vh; overflow-y: auto; padding: 20px;
        background: rgba(0,0,0,0.3); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);
    }
    .level-grid::-webkit-scrollbar { width: 6px; }
    .level-grid::-webkit-scrollbar-track { background: transparent; }
    .level-grid::-webkit-scrollbar-thumb { background: var(--neon-primary); border-radius: 10px; }
    
    .lvl-btn {
        width: 100%; aspect-ratio: 1; border: 1px solid #333; border-radius: 8px;
        background: rgba(0,0,0,0.6); color: #555; font-size: 1.3rem; font-weight: bold;
        cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex;
        justify-content: center; align-items: center;
    }
    .lvl-btn.unlocked {
        border-color: var(--neon-primary); color: #fff; text-shadow: 0 0 5px var(--neon-primary);
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.15), inset 0 0 10px rgba(0, 243, 255, 0.1);
    }
    .lvl-btn.unlocked:hover {
        background: var(--neon-primary); color: var(--bg); box-shadow: 0 0 25px var(--neon-primary);
        transform: scale(1.1); text-shadow: none;
    }
    
    #dpad {
        position: absolute; bottom: 40px; right: 40px;
        display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px;
        gap: 8px; opacity: 0.4; z-index: 5; transition: opacity 0.3s;
    }
    @media (min-width: 800px) { #dpad { display: none; } }
    #dpad:active { opacity: 1; }
    .d-btn {
        background: rgba(0, 243, 255, 0.05); border: 1px solid rgba(0, 243, 255, 0.3);
        color: var(--neon-primary); font-size: 1.5rem; font-weight: bold; display: flex;
        justify-content: center; align-items: center; border-radius: 12px; cursor: pointer;
    }
    .d-btn:active { background: rgba(0, 243, 255, 0.3); box-shadow: 0 0 20px var(--neon-primary); transform: scale(0.95); }
    #btnUp { grid-column: 2; grid-row: 1; }
    #btnLeft { grid-column: 1; grid-row: 2; }
    #btnAction { grid-column: 2; grid-row: 2; font-size: 0.9rem; color: #fff; }
    #btnRight { grid-column: 3; grid-row: 2; }
    #btnDown { grid-column: 2; grid-row: 3; }

    #popup {
        position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%) translateY(20px);
        background: rgba(0,0,0,0.85); border: 1px solid var(--neon-secondary); border-radius: 30px;
        padding: 12px 30px; color: #fff; z-index: 20; opacity: 0; pointer-events: none;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; 
        text-shadow: 0 0 8px var(--neon-secondary); font-size: 1.1rem; font-weight: bold;
        box-shadow: 0 5px 25px rgba(255, 0, 234, 0.3);
    }
    #popup.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #minimapContainer {
        position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px;
        border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 8px; background: rgba(0,0,0,0.6); 
        z-index: 5; opacity: 0.8; pointer-events: none; display: none; overflow: hidden;
        contain: layout style paint;
        box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); 
    }
    canvas#minimap { width: 100%; height: 100%; image-rendering: pixelated; }
</style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="minimapContainer"><canvas id="minimap"></canvas></div>

    <div id="hud">
        <div class="hud-block"><span class="hud-text" id="levelDisplay">SEQ 01</span></div>
        <div class="hud-block"><span class="hud-text" id="statsDisplay">STEPS: 0 | TOOLS: 0 | KEYS: 0</span></div>
        <div class="hud-block" id="controls-hud">
            <span class="hud-text" id="btnActionHUD" style="margin-right:15px; color: #ffea00;">[SPACE] PUSH: OFF</span>
            <span class="hud-text" id="btnRestart" style="margin-right:15px;">[R] RESTART</span>
            <span class="hud-text" id="btnPause">[ESC] PAUSE</span>
        </div>
    </div>

    <div id="screenStart" class="screen active">
        <h1>Serpent Relic</h1>
        <button class="btn btn-continue" id="btnContinue" style="display:none;">Resume</button>
        <button class="btn" id="btnPlay">Play Now</button>
        <button class="btn" id="btnLevelsStart" style="display:none;">Levels</button>
    </div>

    <div id="screenLevels" class="screen">
        <h2>Select Sequence</h2>
        <div class="level-grid" id="levelGrid"></div>
        <button class="btn" id="btnBackToStart">Back to Core</button>
    </div>

    <div id="screenPause" class="screen">
        <h2>System Paused</h2>
        <button class="btn" id="btnResume">Resume Sequence</button>
        <button class="btn" id="btnLevelSelect">Sequence Directory</button>
    </div>

    <div id="screenWin" class="screen">
        <h1 style="color: var(--neon-success); text-shadow: 0 0 30px var(--neon-success);">Sequence Cleared</h1>
        <p id="winStats" style="color:#fff; font-size:1.3rem;"></p>
        <button class="btn" id="btnNextLevel">Next Sequence</button>
    </div>

    <div id="screenEnd" class="screen">
        <h1 style="color: var(--neon-secondary);">Relic Restored</h1>
        <p>You have conquered the 100 Levels!</p>
        <button class="btn btn-continue" id="btnGenerateMore">Click / Touch here to play more levels</button>
        <button class="btn" id="btnMenuFromEnd">Return to Core</button>
    </div>

    <div id="dpad">
        <div class="d-btn" id="btnUp">W</div>
        <div class="d-btn" id="btnLeft">A</div>
        <div class="d-btn" id="btnAction">PUSH</div>
        <div class="d-btn" id="btnRight">D</div>
        <div class="d-btn" id="btnDown">S</div>
    </div>

    <div id="popup"></div>
</div>

<script>
window.onload = () => {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const minimapCanvas = document.getElementById('minimap');
    const minimapCtx = minimapCanvas.getContext('2d');
    
    let canvasW, canvasH;
    const TILE_SIZE = 40;
    
    const STATE = { MENU: 0, PLAYING: 1, PAUSED: 2, TRANSITION: 3, LEVEL_SELECT: 4 };
    let currentState = STATE.MENU;
    let unlockedLevels = parseInt(localStorage.getItem('serpentUnlockedV3')) || 1;
    let savedLevelIdx = localStorage.getItem('serpentSavedLevelV3');
    let currentLevelIdx = 0;
    
    let lastTime = 0, globalTime = 0;
    let particles = [];
    const MAX_PARTICLES = 120;
    let camera = { x: 0, y: 0, targetX: 0, targetY: 0, shake: 0 };
    
    let snake = [], twinSnake = [], mirrorSnake = [];
    let map = [], mapCols = 0, mapRows = 0;
    let inventory = { tools: 0, keys: 0 };
    let puzzleState = { links: [], darkness: false, hasMirror: false, hasTwin: false, teleports: [] };
    let moveCount = 0, isMoving = false, moveProgress = 0, moveDuration = window.innerWidth < 700 ? 110 : 140; 
    let snakeDir = { x: 0, y: 0 };
    let enemies = [];
    
    // Naye Mechanics State
    let pushMode = false;

    // Auto low-performance optimization
    const LOW_END_DEVICE = navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4;
    if (LOW_END_DEVICE) {
        moveDuration = 100;
    }

    let activeTraps = [];
    let deathTimer = null;

    const AudioEngine = (() => {
        let actx = null, masterGain = null, initialized = false;
        const init = () => {
            if (initialized) return;
            try {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                actx = new AudioContext();
                masterGain = actx.createGain(); masterGain.gain.value = 0.2;
                masterGain.connect(actx.destination); initialized = true;
            } catch(e) {}
        };
        const playTone = (freq, type, duration, vol=1) => {
            if(!initialized || !actx) return;
            try {
                const osc = actx.createOscillator(); const gain = actx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, actx.currentTime);
                gain.gain.setValueAtTime(vol, actx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
                osc.connect(gain); gain.connect(masterGain); osc.start(); osc.stop(actx.currentTime + duration);
            } catch(e) {}
        };
        const playNoise = (duration, vol=1) => {
            if(!initialized || !actx) return;
            try {
                const bufferSize = actx.sampleRate * duration;
                const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = actx.createBufferSource(); noise.buffer = buffer;
                const gain = actx.createGain();
                gain.gain.setValueAtTime(vol, actx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
                const filter = actx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800;
                noise.connect(filter); filter.connect(gain); gain.connect(masterGain); noise.start();
            } catch(e) {}
        };
        return {
            init, move: () => playTone(180, 'sine', 0.08, 0.4), hit: () => playTone(100, 'sawtooth', 0.2, 0.8),
            pickup: () => { playTone(600, 'sine', 0.1, 0.5); setTimeout(()=>playTone(800, 'sine', 0.2, 0.5), 80); },
            breakRock: () => playNoise(0.3, 1), switch: () => playTone(400, 'square', 0.1, 0.4), door: () => playNoise(0.4, 0.5),
            win: () => { playTone(440, 'sine', 0.15); setTimeout(()=>playTone(554, 'sine', 0.15), 150); setTimeout(()=>playTone(659, 'sine', 0.3), 300); }
        };
    })();

    const colorMap = {
        1: 'rgba(25, 35, 50, 0.9)', 2: '#00ff66', 3: '#ff00ea', 4: '#ffea00', 5: '#00f3ff',
        6: '#ff003c', 7: '#444', 8: 'rgba(0, 243, 255, 0.1)', 9: '#aa00ff', 'C': 'rgba(150, 200, 255, 0.15)',
        'D': '#00f3ff', 'E': '#00f3ff', 'M': '#05070a', 'H': '#ffffff', 'T': '#ff003c', 'W': '#ff8800',
        'K': '#ffea00', 'L': '#ff5500', 'V': '#020204', 'O': '#00bfff', 'G': '#ffd700'
    };

    const LEVELS = [];

    function generateMoreLevels(startIdx, count) {
        for(let i = startIdx; i < startIdx + count; i++) {
            let w = 12 + Math.floor(Math.random() * 6);
            let h = 10 + Math.floor(Math.random() * 6);
            let grid = Array(h).fill().map(() => Array(w).fill('0'));
            let path = [];

            let cx = 1, cy = 1;
            grid[cy][cx] = '2'; path.push({x:cx, y:cy});
            let tx = w - 2, ty = h - 2;

            while(cx !== tx || cy !== ty) {
                if (Math.random() < 0.5) { 
                    if (cx < tx) cx++; else if (cx > tx) cx--; 
                } else { 
                    if (cy < ty) cy++; else if (cy > ty) cy--; 
                }
                if(grid[cy][cx] !== '2') { 
                    grid[cy][cx] = '1'; 
                    path.push({x:cx, y:cy}); 
                }
            }
            grid[ty][tx] = '3';

            let deadEndTips = [];
            for(let d=0; d < 4; d++) {
                let pIdx = Math.floor(Math.random() * (path.length / 2));
                let start = path[pIdx];
                if(!start) continue;
                let bx = start.x, by = start.y;
                let lastValid = null;
                for(let step=0; step<3; step++) {
                    if(Math.random() > 0.5) { bx += (Math.random()>0.5?1:-1); } else { by += (Math.random()>0.5?1:-1); }
                    if(bx > 0 && bx < w-1 && by > 0 && by < h-1 && grid[by][bx] === '0') {
                        grid[by][bx] = '1'; lastValid = {x: bx, y: by};
                    }
                }
                if(lastValid) deadEndTips.push(lastValid);
            }

            let hasDarkness = Math.random() < 0.15;
            let hasTwin = Math.random() < 0.20;
            let hasKeys = Math.random() < 0.35;
            let hasBreakable = Math.random() < 0.35;
            let hasPatrols = Math.random() < 0.35;
            
            let enemiesList = [], teleportsList = [], tips = [];

            // Twin Mechanics (Naye systems ke sath: Golden Wall & Orb)
            if (hasTwin && deadEndTips.length > 0) { 
                tips.push("Twin Snakes Co-op"); 
                let tip = deadEndTips.pop(); 
                grid[tip.y][tip.x] = 'W'; 
                
                // Add Orb 'O' for 2nd snake to find
                if (deadEndTips.length > 0) {
                    let orbTip = deadEndTips.pop();
                    grid[orbTip.y][orbTip.x] = 'O'; 
                } else {
                    let randP = path[Math.floor(Math.random() * (path.length / 3))];
                    grid[randP.y][randP.x] = 'O';
                }

                // Add Golden Barrier 'G' to block main snake
                let blockIdx = Math.floor(path.length * 0.5); 
                if (grid[path[blockIdx].y][path[blockIdx].x] === '1') {
                    grid[path[blockIdx].y][path[blockIdx].x] = 'G';
                }
            } 

            if (hasKeys) {
                tips.push("Keys & Doors");
                let doorIdx = Math.floor(path.length * 0.75);
                if (grid[path[doorIdx].y][path[doorIdx].x] === '1') {
                    grid[path[doorIdx].y][path[doorIdx].x] = 'L';
                    if (deadEndTips.length > 0) { 
                        let tip = deadEndTips.pop(); 
                        grid[tip.y][tip.x] = 'K'; 
                    } else { 
                        let keyIdx = Math.floor(path.length * 0.25); 
                        grid[path[keyIdx].y][path[keyIdx].x] = 'K'; 
                    }
                }
            }

            if (hasBreakable) {
                tips.push("Breakable/Pushable Barriers");
                let blockIdx = Math.floor(path.length * 0.6);
                if (grid[path[blockIdx].y][path[blockIdx].x] === '1') {
                    grid[path[blockIdx].y][path[blockIdx].x] = '4'; // Breakable block
                    let toolIdx = Math.floor(path.length * 0.2);
                    if(grid[path[toolIdx].y][path[toolIdx].x] === '1') {
                        grid[path[toolIdx].y][path[toolIdx].x] = '5'; // Tool
                    }
                }
            }

            if (hasPatrols) {
                tips.push("Enemies");
                let enemyCount = 1 + Math.floor(Math.random() * 2);
                for(let e=0; e < enemyCount; e++) {
                    let epIdx = Math.floor(Math.random() * (path.length - 5)) + 3;
                    let ep = path[epIdx];
                    if(grid[ep.y][ep.x] === '1' || grid[ep.y][ep.x] === '0') {
                        for(let k=-1; k<=2; k++) {
                            if(ep.x+k > 0 && ep.x+k < w-1) {
                                if(grid[ep.y][ep.x+k] === '0') grid[ep.y][ep.x+k] = '1';
                            }
                        }
                        enemiesList.push({
                            x: ep.x, y: ep.y, 
                            dir: 1, 
                            min: Math.max(1, ep.x-1), 
                            max: Math.min(w-2, ep.x+2), 
                            speed: 0.04 + (Math.random() * 0.02)
                        });
                    }
                }
            }

            if (hasDarkness) tips.push("Darkness");

            LEVELS.push({
                name: `Sequence ${(i).toString().padStart(3, '0')}`,
                tip: tips.length > 0 ? "Hazards: " + tips.join(", ") : "Navigate the cyber maze.",
                darkness: hasDarkness, hasMirror: false, hasTwin: hasTwin, enemies: enemiesList, teleports: teleportsList,
                layout: grid.map(row => row.join(''))
            });
        }
    }

    // Generate initial 100 levels
    generateMoreLevels(1, 100);

    function resize() {
        canvasW = canvas.clientWidth; canvasH = canvas.clientHeight;
        canvas.width = canvasW; canvas.height = canvasH;
        minimapCanvas.width = 120; minimapCanvas.height = 120;
        ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    }
    window.addEventListener('resize', resize); resize();

    if (savedLevelIdx !== null && parseInt(savedLevelIdx) > 0 && parseInt(savedLevelIdx) < LEVELS.length) {
        document.getElementById('btnContinue').style.display = 'inline-block';
    }

    // Push Mode Logic
    function togglePushMode() {
        pushMode = !pushMode;
        document.getElementById('btnActionHUD').innerText = `[SPACE] PUSH: ${pushMode ? 'ON' : 'OFF'}`;
        document.getElementById('btnActionHUD').style.color = pushMode ? '#00f3ff' : '#ffea00';
        const btn = document.getElementById('btnAction');
        if(btn) {
            btn.style.background = pushMode ? 'rgba(0, 243, 255, 0.4)' : 'rgba(0, 243, 255, 0.05)';
        }
    }

    window.addEventListener('keydown', (e) => {
        if(currentState === STATE.MENU || currentState === STATE.LEVEL_SELECT) return;
        if(e.key === 'Escape') togglePause();
        if(e.key.toLowerCase() === 'r') resetLevel();
        if(e.code === 'Space') { e.preventDefault(); togglePushMode(); }
        
        if(!isMoving && currentState === STATE.PLAYING) {
            let dx = 0, dy = 0;
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') dy = -1;
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') dy = 1;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') dx = -1;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') dx = 1;
            if (dx !== 0 || dy !== 0) queueMove(dx, dy);
        }
    });

    const bindBtn = (id, dx, dy) => {
        const btn = document.getElementById(id);
        const trigger = (e) => { e.preventDefault(); if(!isMoving && currentState === STATE.PLAYING) queueMove(dx, dy); };
        btn.addEventListener('touchstart', trigger, {passive: false}); btn.addEventListener('mousedown', trigger);
    };
    bindBtn('btnUp', 0, -1); bindBtn('btnDown', 0, 1); bindBtn('btnLeft', -1, 0); bindBtn('btnRight', 1, 0);

    // Bind UI action buttons
    const actionBtn = document.getElementById('btnAction');
    actionBtn.addEventListener('touchstart', (e) => { e.preventDefault(); togglePushMode(); }, {passive: false});
    actionBtn.addEventListener('mousedown', (e) => { e.preventDefault(); togglePushMode(); });
    document.getElementById('btnActionHUD').addEventListener('click', togglePushMode);

    document.getElementById('btnPlay').addEventListener('click', () => { AudioEngine.init(); showScreen('screenLevels'); generateLevelGrid(); });
    document.getElementById('btnContinue').addEventListener('click', () => { AudioEngine.init(); loadLevel(parseInt(localStorage.getItem('serpentSavedLevelV3'))); });
    document.getElementById('btnBackToStart').addEventListener('click', () => showScreen('screenStart'));
    document.getElementById('btnPause').addEventListener('click', togglePause);
    document.getElementById('btnResume').addEventListener('click', togglePause);
    document.getElementById('btnLevelSelect').addEventListener('click', () => { currentState = STATE.LEVEL_SELECT; showScreen('screenLevels'); generateLevelGrid(); });
    document.getElementById('btnRestart').addEventListener('click', resetLevel);
    document.getElementById('btnNextLevel').addEventListener('click', () => {
        currentLevelIdx++;
        if(currentLevelIdx >= LEVELS.length) showScreen('screenEnd'); else loadLevel(currentLevelIdx);
    });
    document.getElementById('btnMenuFromEnd').addEventListener('click', () => showScreen('screenStart'));

    function togglePause() {
        if (currentState === STATE.PLAYING) { currentState = STATE.PAUSED; showScreen('screenPause'); } 
        else if (currentState === STATE.PAUSED) { currentState = STATE.PLAYING; hideScreens(); }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id) document.getElementById(id).classList.add('active');
        if(['screenLevels', 'screenStart', 'screenWin', 'screenEnd'].includes(id)) { document.getElementById('minimapContainer').style.display = 'none'; }
    }

    function hideScreens() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('minimapContainer').style.display = 'block';
    }

    function showPopup(text, dur = 3500) {
        const p = document.getElementById('popup');
        p.innerText = text; p.classList.add('show');
        setTimeout(() => p.classList.remove('show'), dur);
    }

    function generateLevelGrid() {
        const grid = document.getElementById('levelGrid'); grid.innerHTML = '';
        for(let i=0; i<LEVELS.length; i++) {
            const btn = document.createElement('button'); btn.className = `lvl-btn ${i < unlockedLevels ? 'unlocked' : ''}`; btn.innerText = i + 1;
            if(i < unlockedLevels) btn.onclick = () => { loadLevel(i); AudioEngine.init(); };
            grid.appendChild(btn);
        }
    }

    function loadLevel(index) {
        currentLevelIdx = index; const levelData = LEVELS[index]; localStorage.setItem('serpentSavedLevelV3', index);
        mapRows = levelData.layout.length; mapCols = levelData.layout[0].length;
        map = []; snake = []; twinSnake = []; mirrorSnake = []; enemies = []; activeTraps = [];
        inventory = { tools: 0, keys: 0 }; moveCount = 0; isMoving = false; particles = [];
        pushMode = false; document.getElementById('btnActionHUD').innerText = "[SPACE] PUSH: OFF"; document.getElementById('btnActionHUD').style.color = '#ffea00';
        if(document.getElementById('btnAction')) document.getElementById('btnAction').style.background = 'rgba(0, 243, 255, 0.05)';
        if (deathTimer) clearTimeout(deathTimer);
        
        puzzleState = {
            darkness: levelData.darkness || false, hasMirror: levelData.hasMirror || false, hasTwin: levelData.hasTwin || false,
            links: levelData.links || [], teleports: levelData.teleports || []
        };

        for (let y = 0; y < mapRows; y++) {
            let row = [];
            for (let x = 0; x < mapCols; x++) {
                let char = levelData.layout[y][x]; let type = isNaN(parseInt(char)) ? char : parseInt(char);
                let tileData = { x, y, type: type, originalType: type };
                
                if (type === 2) { for(let i=0; i<3; i++) snake.push({x: x, y: y}); tileData.type = 1; }
                if (type === 'W') { for(let i=0; i<3; i++) twinSnake.push({x: x, y: y}); tileData.type = 1; puzzleState.hasTwin = true; }
                if (type === 9) { for(let i=0; i<3; i++) mirrorSnake.push({x: x, y: y}); tileData.type = 1; }
                if (type === 'T') { tileData.trapState = 'HIDDEN'; tileData.triggerTime = 0; activeTraps.push(tileData); }
                
                row.push(tileData);
            }
            map.push(row);
        }
        
        snake.escaped = false; twinSnake.escaped = false;
        if(levelData.enemies) levelData.enemies.forEach(e => { enemies.push({x: e.x, y: e.y, visualX: e.x, visualY: e.y, dir: e.dir, min: e.min, max: e.max, speed: e.speed}); });

        updateHUD(); showPopup(levelData.name + " | " + levelData.tip, 4500);
        currentState = STATE.PLAYING; hideScreens();
        
        camera.x = snake[0].x * TILE_SIZE - canvasW/2; camera.y = snake[0].y * TILE_SIZE - canvasH/2;
        drawMinimap();
    }

    function resetLevel() {
        if([STATE.PLAYING, STATE.PAUSED, STATE.TRANSITION].includes(currentState)) {
            if (deathTimer) clearTimeout(deathTimer); loadLevel(currentLevelIdx);
        }
    }

    function updateHUD() {
        document.getElementById('levelDisplay').innerText = `SEQ ${(currentLevelIdx + 1).toString().padStart(3, '0')}`;
        document.getElementById('statsDisplay').innerText = `STEPS: ${moveCount} | TOOLS: ${inventory.tools} | KEYS: ${inventory.keys}`;
    }

    function queueMove(dx, dy) {
        if(isMoving || currentState !== STATE.PLAYING) return;
        if(!snake.escaped && snake.length > 1 && snake[0].x + dx === snake[1].x && snake[0].y + dy === snake[1].y) snake.reverse();
        if(puzzleState.hasTwin && !twinSnake.escaped && twinSnake.length > 1 && twinSnake[0].x + dx === twinSnake[1].x && twinSnake[0].y + dy === twinSnake[1].y) twinSnake.reverse();
        processMove(dx, dy);
    }

    function tryMoveSnake(sArr, dx, dy, isMain) {
        if (sArr.escaped) return false;
        const head = sArr[0]; const nx = head.x + dx, ny = head.y + dy;
        if (nx < 0 || nx >= mapCols || ny < 0 || ny >= mapRows) return false;
        const targetTile = map[ny][nx]; const tType = targetTile.type;

        if (tType === 0 || tType === 7) return false; 
        if (tType === 'V') { if(isMain){AudioEngine.hit(); cameraShake(5);} return false; }
        if (tType === 'G') { if(isMain){AudioEngine.hit(); cameraShake(5);} showPopup("Blocked by Golden Barrier!", 1500); return false; }

        // Breakable Block logic + Naye "Push" Mechanics
        if (tType === 4 || tType === 'H') {
            if (pushMode) {
                // Try pushing the block
                let pushX = nx + dx, pushY = ny + dy;
                if (pushX >= 0 && pushX < mapCols && pushY >= 0 && pushY < mapRows) {
                    let targetBlock = map[pushY][pushX];
                    if (targetBlock.type === 1 || targetBlock.type === 'M') {
                        targetBlock.type = tType; // Move block forward
                        targetTile.type = 1; 
                        AudioEngine.breakRock(); 
                        createParticles(pushX * TILE_SIZE + 20, pushY * TILE_SIZE + 20, '#ffffff', 15);
                    } else if (tType === 'H' && targetBlock.type === 'V') {
                        targetBlock.type = 1; targetTile.type = 1; AudioEngine.breakRock(); cameraShake(8); createParticles(pushX * TILE_SIZE + 20, pushY * TILE_SIZE + 20, '#00f3ff', 30); showPopup("Path Created!");
                    } else { if(isMain){AudioEngine.hit(); cameraShake(5);} return false; }
                } else { if(isMain){AudioEngine.hit(); cameraShake(5);} return false; }
            } else {
                // Default Old Logic
                if (tType === 4) {
                    if (isMain && inventory.tools > 0) {
                        inventory.tools--; targetTile.type = 1; AudioEngine.breakRock(); createParticles(nx * TILE_SIZE + 20, ny * TILE_SIZE + 20, '#ffea00', 25); cameraShake(10); showPopup("Barrier Shattered");
                    } else { if(isMain){AudioEngine.hit(); cameraShake(5);} showPopup("Needs Tool to Break, or Push Mode!", 1500); return false; }
                } else if (tType === 'H') {
                    let pushX = nx + dx, pushY = ny + dy;
                    if (pushX >= 0 && pushX < mapCols && pushY >= 0 && pushY < mapRows) {
                        let targetBlock = map[pushY][pushX];
                        if (targetBlock.type === 1 || targetBlock.type === 'M') {
                            targetBlock.type = 'H'; targetTile.type = 1; AudioEngine.breakRock(); createParticles(pushX * TILE_SIZE + 20, pushY * TILE_SIZE + 20, '#ffffff', 15);
                        } else if (targetBlock.type === 'V') {
                            targetBlock.type = 1; targetTile.type = 1; AudioEngine.breakRock(); cameraShake(8); createParticles(pushX * TILE_SIZE + 20, pushY * TILE_SIZE + 20, '#00f3ff', 30); showPopup("Path Created!");
                        } else { if(isMain){AudioEngine.hit(); cameraShake(5);} return false; }
                    } else { if(isMain){AudioEngine.hit(); cameraShake(5);} return false; }
                }
            }
        }

        if (tType === 'L') {
            if (inventory.keys > 0) {
                inventory.keys--; targetTile.type = 1; AudioEngine.door(); createParticles(nx * TILE_SIZE + 20, ny * TILE_SIZE + 20, '#ffea00', 20); showPopup("Door Unlocked!");
            } else { if(isMain){AudioEngine.hit(); cameraShake(5);} showPopup("Needs a Key!", 1000); return false; }
        }

        if(tType === 'M') { targetTile.type = 1; }

        let newArr = [{x: nx, y: ny}];
        for(let i=0; i<sArr.length-1; i++) newArr.push({x: sArr[i].x, y: sArr[i].y});
        sArr.forEach(s => { s.oldX = s.x; s.oldY = s.y; });
        for(let i=0; i<sArr.length; i++) { sArr[i].x = newArr[i].x; sArr[i].y = newArr[i].y; }
        return true;
    }

    function processMove(dx, dy) {
        let movedMain = tryMoveSnake(snake, dx, dy, true);
        let movedTwin = false;
        if (puzzleState.hasTwin) movedTwin = tryMoveSnake(twinSnake, dx, dy, false);
        if (!movedMain && !movedTwin && !puzzleState.hasMirror) return; 

        isMoving = true; moveProgress = 0; snakeDir = {x: dx, y: dy};
        if (movedMain || movedTwin) { moveCount++; updateHUD(); AudioEngine.move(); }

        if(puzzleState.hasMirror && mirrorSnake.length > 0 && movedMain) {
            let mnx = mirrorSnake[0].x - dx, mny = mirrorSnake[0].y - dy;
            if (mnx >= 0 && mnx < mapCols && mny >= 0 && mny < mapRows && ![0,4,7,'H','L','V','G'].includes(map[mny][mnx].type)) {
                let newMirror = [{x: mnx, y: mny}];
                for(let i=0; i<mirrorSnake.length-1; i++) newMirror.push({x: mirrorSnake[i].x, y: mirrorSnake[i].y});
                mirrorSnake.forEach(s => { s.oldX = s.x; s.oldY = s.y; });
                for(let i=0; i<mirrorSnake.length; i++) { mirrorSnake[i].x = newMirror[i].x; mirrorSnake[i].y = newMirror[i].y; }
            }
        }
    }

    function checkTileEvents() {
        if (currentState !== STATE.PLAYING) return;
        
        let checkHead = (sArr, isMain) => {
            if(!sArr || sArr.length===0 || sArr.escaped) return;
            const head = sArr[0]; const tile = map[head.y][head.x];

            if (tile.type === 'T' && (tile.trapState === 'HIDDEN' || tile.trapState === 'ACTIVE')) return gameOver("Ambush Triggered!");

            // Naya Orb Mechanics
            if (tile.type === 'O') {
                tile.type = 1; AudioEngine.pickup(); updateHUD();
                createParticles(head.x*TILE_SIZE+20, head.y*TILE_SIZE+20, '#00bfff', 30); 
                showPopup("Orb Collected! Path Cleared!");
                
                // Remove all Golden Walls 'G'
                for (let y = 0; y < mapRows; y++) {
                    for (let x = 0; x < mapCols; x++) {
                        if (map[y][x].type === 'G') {
                            map[y][x].type = 1;
                            createParticles(x * TILE_SIZE + 20, y * TILE_SIZE + 20, '#ffd700', 25);
                        }
                    }
                }
                cameraShake(10); AudioEngine.breakRock();
            }

            if (isMain && tile.type === 5) {
                inventory.tools++; tile.type = 1; AudioEngine.pickup(); updateHUD();
                createParticles(head.x*TILE_SIZE+20, head.y*TILE_SIZE+20, '#00f3ff', 20); showPopup("Relic Tool Acquired");
            }
            if (isMain && tile.type === 'K') {
                inventory.keys++; tile.type = 1; AudioEngine.pickup(); updateHUD();
                createParticles(head.x*TILE_SIZE+20, head.y*TILE_SIZE+20, '#ffea00', 20); showPopup("Key Collected");
            }

            if (tile.type === 6) {
                AudioEngine.switch(); createParticles(head.x*TILE_SIZE+20, head.y*TILE_SIZE+20, '#ff003c', 15);
                puzzleState.links.forEach(link => {
                    if(link.s.x === head.x && link.s.y === head.y) {
                        let dTile = map[link.d.y][link.d.x]; dTile.type = (dTile.type === 7) ? 8 : 7; AudioEngine.door(); cameraShake(8);
                    }
                });
            }

            if (tile.type === 'D' || tile.type === 'E') {
                puzzleState.teleports.forEach(t => {
                    if(t.a.x === head.x && t.a.y === head.y) teleportSnake(sArr, t.b.x, t.b.y);
                    else if (t.b.x === head.x && t.b.y === head.y) teleportSnake(sArr, t.a.x, t.a.y);
                });
            }
            
            if (tile.type === 'C') { setTimeout(() => { if(currentState === STATE.PLAYING) queueMove(snakeDir.x, snakeDir.y); }, 50); }
            
            if (tile.type === 3) {
                sArr.escaped = true; AudioEngine.switch(); createParticles(head.x*TILE_SIZE+20, head.y*TILE_SIZE+20, '#00ff66', 30);
                if (puzzleState.hasTwin) {
                    if (snake.escaped && twinSnake.escaped) levelComplete();
                    else showPopup("Waiting for Twin...", 2000);
                } else levelComplete();
            }
            for(let e of enemies) if(Math.abs(e.visualX - head.x) < 0.6 && Math.abs(e.visualY - head.y) < 0.6) return gameOver("Sentinel Interception");
        };

        checkHead(snake, true);
        if(puzzleState.hasTwin) checkHead(twinSnake, false);
        if(puzzleState.hasMirror) { for(let m of mirrorSnake) if(!snake.escaped && m.x === snake[0].x && m.y === snake[0].y) return gameOver("Phantom Collision"); }
        drawMinimap();
    }

    function teleportSnake(sArr, tx, ty) {
        AudioEngine.switch(); createParticles(sArr[0].x*TILE_SIZE+20, sArr[0].y*TILE_SIZE+20, '#00f3ff', 25);
        for(let i=0; i<sArr.length; i++) { sArr[i].oldX = tx; sArr[i].oldY = ty; sArr[i].x = tx; sArr[i].y = ty; }
        createParticles(tx*TILE_SIZE+20, ty*TILE_SIZE+20, '#00f3ff', 25);
    }

    function levelComplete() {
        currentState = STATE.TRANSITION; AudioEngine.win();
        if(currentLevelIdx + 1 > unlockedLevels) {
            unlockedLevels = currentLevelIdx + 2; localStorage.setItem('serpentUnlockedV3', unlockedLevels);
        }
        document.getElementById('winStats').innerText = `Steps: ${moveCount} | Mastery achieved.`;
        setTimeout(() => showScreen('screenWin'), 1200);
    }

    function gameOver(reason) {
        if (currentState === STATE.TRANSITION) return;
        currentState = STATE.TRANSITION; AudioEngine.hit(); cameraShake(25);
        if(!snake.escaped) createParticles(snake[0].x*TILE_SIZE+20, snake[0].y*TILE_SIZE+20, '#ff003c', 40);
        showPopup(`Critical Failure: ${reason || 'System Crash'}`, 2500);
        deathTimer = setTimeout(() => resetLevel(), 2500);
    }

    function createParticles(x, y, color, count) {
        for(let i=0; i<count; i++) {
            if (particles.length >= MAX_PARTICLES) break;
            particles.push({
                x: x,
                y: y,
                vx: (Math.random()-0.5)*8,
                vy: (Math.random()-0.5)*8,
                life: 1,
                color: color,
                size: Math.random()*4+1
            });
        }
    }
    function cameraShake(amt) { camera.shake = amt; }

    function drawMinimap() {
        if(currentState !== STATE.PLAYING) return;
        minimapCtx.clearRect(0,0,120,120); let scX = 120 / mapCols, scY = 120 / mapRows;
        for(let y=0; y<mapRows; y++){
            for(let x=0; x<mapCols; x++){
                let t = map[y][x].type;
                if(t !== 0 && t !== 'M') {
                    minimapCtx.fillStyle = (t === 'T') ? '#222' : (colorMap[t] || '#222');
                    if(t===1) minimapCtx.fillStyle = '#444';
                    minimapCtx.fillRect(x*scX, y*scY, scX, scY);
                }
            }
        }
        if(!snake.escaped) { minimapCtx.fillStyle = '#00f3ff'; minimapCtx.fillRect(snake[0].x*scX, snake[0].y*scY, scX, scY); }
        if(puzzleState.hasTwin && !twinSnake.escaped) { minimapCtx.fillStyle = '#ff8800'; minimapCtx.fillRect(twinSnake[0].x*scX, twinSnake[0].y*scY, scX, scY); }
    }

    function update(dt) {
        globalTime += dt;
        let camTargetX = 0, camTargetY = 0, numTargets = 0;
        if(!snake.escaped && snake.length > 0) {
            let hx = (snake[0].oldX !== undefined ? snake[0].oldX + (snake[0].x - snake[0].oldX) * (moveProgress/moveDuration) : snake[0].x) * TILE_SIZE;
            let hy = (snake[0].oldY !== undefined ? snake[0].oldY + (snake[0].y - snake[0].oldY) * (moveProgress/moveDuration) : snake[0].y) * TILE_SIZE;
            camTargetX += hx; camTargetY += hy; numTargets++;
        }
        if(puzzleState.hasTwin && !twinSnake.escaped && twinSnake.length > 0) {
            let tx = (twinSnake[0].oldX !== undefined ? twinSnake[0].oldX + (twinSnake[0].x - twinSnake[0].oldX) * (moveProgress/moveDuration) : twinSnake[0].x) * TILE_SIZE;
            let ty = (twinSnake[0].oldY !== undefined ? twinSnake[0].oldY + (twinSnake[0].y - twinSnake[0].oldY) * (moveProgress/moveDuration) : twinSnake[0].y) * TILE_SIZE;
            camTargetX += tx; camTargetY += ty; numTargets++;
        }
        if(numTargets > 0) {
            camTargetX /= numTargets; camTargetY /= numTargets;
            camera.targetX = camTargetX - canvasW/2 + TILE_SIZE/2; camera.targetY = camTargetY - canvasH/2 + TILE_SIZE/2;
            camera.x += (camera.targetX - camera.x) * 0.1; camera.y += (camera.targetY - camera.y) * 0.1;
        }

        if(camera.shake > 0) { camera.x += (Math.random()-0.5)*camera.shake; camera.y += (Math.random()-0.5)*camera.shake; camera.shake *= 0.9; if(camera.shake<0.5) camera.shake = 0; }
        
        if(isMoving) { 
            moveProgress += dt; 
            if(moveProgress >= moveDuration) { isMoving = false; moveProgress = moveDuration; checkTileEvents(); } 
        }

        if(currentState === STATE.PLAYING) {
            activeTraps.forEach(tile => {
                if (tile.type !== 'T') return;
                if (tile.trapState === 'HIDDEN') {
                    let distM = !snake.escaped && snake.length > 0 ? (Math.abs(tile.x - snake[0].x) + Math.abs(tile.y - snake[0].y)) : 99;
                    let distT = puzzleState.hasTwin && !twinSnake.escaped && twinSnake.length > 0 ? (Math.abs(tile.x - twinSnake[0].x) + Math.abs(tile.y - twinSnake[0].y)) : 99;
                    if (distM <= 2 || distT <= 2) { 
                        tile.trapState = 'ACTIVE'; tile.triggerTime = globalTime; cameraShake(4); AudioEngine.hit(); 
                    }
                } else if (tile.trapState === 'ACTIVE') {
                    if (globalTime - tile.triggerTime > 1500) { tile.trapState = 'SAFE'; AudioEngine.breakRock(); }
                }
            });
            
            enemies.forEach(e => {
                e.visualX += e.speed * e.dir * (dt/16);
                if(e.visualX > e.max) { e.visualX = e.max; e.dir = -1; }
                if(e.visualX < e.min) { e.visualX = e.min; e.dir = 1; }
                if(!snake.escaped && Math.abs(e.visualX - snake[0].x) < 0.6 && Math.abs(e.visualY - snake[0].y) < 0.6) gameOver("Sentinel Interception");
                if(puzzleState.hasTwin && !twinSnake.escaped && Math.abs(e.visualX - twinSnake[0].x) < 0.6 && Math.abs(e.visualY - twinSnake[0].y) < 0.6) gameOver("Twin Destroyed");
            });
        }
        
        for(let i=particles.length-1; i>=0; i--) { 
            let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vx *= 0.95; p.vy *= 0.95; 
            p.life -= dt*0.0015; if(p.life<=0) particles.splice(i, 1); 
        }
    }

    function drawTile(x, y, type) {
        let px = x * TILE_SIZE, py = y * TILE_SIZE;
        let pCenter = {x: px + TILE_SIZE/2, y: py + TILE_SIZE/2};
        
        if (type === 0 || type === 'M') {
            ctx.fillStyle = '#05070a'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            ctx.strokeStyle = 'rgba(0, 100, 255, 0.4)'; ctx.lineWidth = 2; ctx.strokeRect(px + 1, py + 1, TILE_SIZE - 2, TILE_SIZE - 2);
            ctx.strokeStyle = 'rgba(0, 100, 255, 0.15)'; ctx.lineWidth = 1; ctx.beginPath(); 
            ctx.moveTo(px + 4, py + TILE_SIZE - 4); ctx.lineTo(px + TILE_SIZE - 4, py + 4); ctx.stroke(); return; 
        }
        
        if (type !== 'V' && type !== 'G') {
            ctx.fillStyle = 'rgba(25, 35, 50, 0.9)'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.2)'; ctx.lineWidth = 1; ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = 'rgba(0, 243, 255, 0.4)'; ctx.fillRect(pCenter.x - 1, pCenter.y - 1, 2, 2);
        }
        
        let pulse = Math.sin(globalTime * 0.005) * 0.2 + 0.8;

        switch(type) {
            case 3: 
                ctx.shadowBlur = 0; ctx.shadowColor = colorMap[type];
                ctx.save(); ctx.translate(pCenter.x, pCenter.y); ctx.rotate(globalTime * 0.002);
                ctx.strokeStyle = colorMap[type]; ctx.lineWidth = 3; ctx.strokeRect(-TILE_SIZE/2+5, -TILE_SIZE/2+5, TILE_SIZE-10, TILE_SIZE-10); 
                ctx.fillStyle = colorMap[type]; ctx.globalAlpha = 0.5 * pulse; ctx.fillRect(-TILE_SIZE/2+10, -TILE_SIZE/2+10, TILE_SIZE-20, TILE_SIZE-20); 
                ctx.restore(); ctx.shadowBlur = 0; break;
            case 4: 
                ctx.fillStyle = colorMap[type]; ctx.beginPath(); ctx.moveTo(pCenter.x, py+5); ctx.lineTo(px+TILE_SIZE-5, pCenter.y); ctx.lineTo(pCenter.x, py+TILE_SIZE-5); ctx.lineTo(px+5, pCenter.y); ctx.fill(); 
                ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.moveTo(pCenter.x, py+5); ctx.lineTo(pCenter.x, py+TILE_SIZE-5); ctx.lineTo(px+5, pCenter.y); ctx.fill(); break;
            case 5: 
                ctx.shadowBlur = 0; ctx.shadowColor = colorMap[type];
                ctx.fillStyle = colorMap[type]; ctx.globalAlpha = pulse; ctx.beginPath(); ctx.arc(pCenter.x, pCenter.y, 8 * pulse, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; ctx.shadowBlur = 0; break;
            case 'O': 
                ctx.shadowBlur = 0; ctx.shadowColor = colorMap[type];
                ctx.fillStyle = colorMap[type]; ctx.globalAlpha = pulse; ctx.beginPath(); ctx.arc(pCenter.x, pCenter.y, 8 * pulse, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1; ctx.shadowBlur = 0; break;
            case 'G': 
                ctx.fillStyle = '#b8860b'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 2; ctx.strokeRect(px+2, py+2, TILE_SIZE-4, TILE_SIZE-4);
                ctx.beginPath(); ctx.moveTo(px+4, py+4); ctx.lineTo(px+TILE_SIZE-4, py+TILE_SIZE-4); ctx.moveTo(px+TILE_SIZE-4, py+4); ctx.lineTo(px+4, py+TILE_SIZE-4); ctx.stroke(); break;
            case 'K': 
                ctx.shadowBlur = 0; ctx.shadowColor = colorMap[type];
                ctx.fillStyle = colorMap[type]; ctx.globalAlpha = pulse; ctx.beginPath(); ctx.arc(px+14, pCenter.y, 4, 0, Math.PI*2); 
                ctx.fillRect(px+16, pCenter.y-2, 16, 4); ctx.fillRect(px+26, pCenter.y+2, 3, 6); ctx.fillRect(px+30, pCenter.y+2, 3, 4); ctx.fill(); ctx.globalAlpha = 1; ctx.shadowBlur = 0; break;
            case 'L': 
                ctx.fillStyle = colorMap[type]; ctx.fillRect(px, pCenter.y-5, TILE_SIZE, 10);
                ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(pCenter.x, pCenter.y, 4, 0, Math.PI*2); ctx.fill(); ctx.fillRect(pCenter.x-1, pCenter.y, 2, 6); break;
            case 6: 
                ctx.fillStyle = colorMap[type]; ctx.fillRect(px+10, py+10, 20, 20); ctx.fillStyle = '#fff'; ctx.fillRect(px+15, py+15, 10, 10); break;
            case 7: 
                ctx.fillStyle = colorMap[type]; ctx.fillRect(px, pCenter.y-5, TILE_SIZE, 10); ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
                for(let lx=0; lx<TILE_SIZE; lx+=8) { ctx.beginPath(); ctx.moveTo(px+lx, pCenter.y-5); ctx.lineTo(px+lx, pCenter.y+5); ctx.stroke(); } break;
            case 8: 
                ctx.fillStyle = 'rgba(0, 255, 102, 0.2)'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); break;
            case 'C': 
                ctx.fillStyle = 'rgba(150, 200, 255, 0.15)'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE); ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1; ctx.strokeRect(px+4, py+4, TILE_SIZE-8, TILE_SIZE-8); 
                ctx.beginPath(); ctx.moveTo(px+4, py+4); ctx.lineTo(px+TILE_SIZE-4, py+TILE_SIZE-4); ctx.stroke(); break;
            case 'D': case 'E': 
                ctx.strokeStyle = colorMap[type]; ctx.lineWidth = 2; ctx.setLineDash([5, 5]); ctx.save(); ctx.translate(pCenter.x, pCenter.y); ctx.rotate(-globalTime * 0.003);
                ctx.beginPath(); ctx.arc(0, 0, 12 * pulse, 0, Math.PI*2); ctx.stroke(); ctx.restore(); ctx.setLineDash([]); break;
            case 'H': 
                ctx.fillStyle = 'rgba(20, 30, 40, 0.9)'; ctx.fillRect(px+4, py+4, TILE_SIZE-8, TILE_SIZE-8);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(px+6, py+6, TILE_SIZE-12, TILE_SIZE-12);
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(pCenter.x, pCenter.y, 4, 0, Math.PI*2); ctx.fill(); break;
            case 'V': 
                ctx.fillStyle = '#020204'; ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = 'rgba(0, 243, 255, 0.1)'; ctx.lineWidth = 1; ctx.strokeRect(px+2, py+2, TILE_SIZE-4, TILE_SIZE-4);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; ctx.fillRect(px+4, py+4, TILE_SIZE-8, TILE_SIZE-8); break;
            case 'T': 
                let trap = map[y][x];
                if (trap.trapState === 'ACTIVE') {
                    ctx.shadowBlur = 0; ctx.shadowColor = '#ff003c';
                    ctx.fillStyle = 'rgba(255, 0, 60, 0.8)'; ctx.fillRect(px+2, py+2, TILE_SIZE-4, TILE_SIZE-4);
                    ctx.fillStyle = '#ff003c'; ctx.beginPath(); ctx.moveTo(pCenter.x, py+6); ctx.lineTo(px+TILE_SIZE-6, py+TILE_SIZE-6); ctx.lineTo(px+6, py+TILE_SIZE-6); ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (trap.trapState === 'SAFE') {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(px+8, py+8); ctx.lineTo(px+TILE_SIZE-8, py+TILE_SIZE-8); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(px+TILE_SIZE-8, py+8); ctx.lineTo(px+8, py+TILE_SIZE-8); ctx.stroke();
                }
                break;
        }
    }

    function drawSnakeData(sArr, mainColor, glowColor) {
        if(!sArr || sArr.length === 0 || sArr.escaped) return;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        let t = isMoving ? moveProgress / moveDuration : 1;
        
        let pathPts = [];
        for(let i=0; i<sArr.length; i++) {
            let sx = sArr[i].oldX !== undefined ? sArr[i].oldX + (sArr[i].x - sArr[i].oldX)*t : sArr[i].x;
            let sy = sArr[i].oldY !== undefined ? sArr[i].oldY + (sArr[i].y - sArr[i].oldY)*t : sArr[i].y;
            pathPts.push({x: sx * TILE_SIZE + TILE_SIZE/2, y: sy * TILE_SIZE + TILE_SIZE/2});
        }

        ctx.beginPath();
        for(let i=0; i<pathPts.length; i++) { if(i===0) ctx.moveTo(pathPts[i].x, pathPts[i].y); else ctx.lineTo(pathPts[i].x, pathPts[i].y); }
        ctx.lineWidth = 22; ctx.shadowBlur = 0; ctx.shadowColor = glowColor; ctx.strokeStyle = `rgba(255,255,255,0.1)`; ctx.stroke();
        ctx.shadowBlur = 0; ctx.lineWidth = 14; 
        let grad = ctx.createLinearGradient(pathPts[0].x, pathPts[0].y, pathPts[pathPts.length-1].x, pathPts[pathPts.length-1].y);
        grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, mainColor); grad.addColorStop(1, '#111'); ctx.strokeStyle = grad; ctx.stroke();

        let headPos = pathPts[0];
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(headPos.x, headPos.y, 8, 0, Math.PI*2); ctx.fill();
        
        let dirX = (sArr[0].x - (sArr[0].oldX||sArr[0].x)) || snakeDir.x || 1;
        let dirY = (sArr[0].y - (sArr[0].oldY||sArr[0].y)) || snakeDir.y || 0;
        let angle = Math.atan2(dirY, dirX);
        ctx.save(); ctx.translate(headPos.x, headPos.y); ctx.rotate(angle);
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(3, -3, 2, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(3, 3, 2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvasW, canvasH);
        ctx.imageSmoothingEnabled = false;
        if (currentState === STATE.MENU || currentState === STATE.LEVEL_SELECT) return;

        ctx.save(); ctx.translate(Math.floor(-camera.x), Math.floor(-camera.y));
        
        if (!LOW_END_DEVICE) {
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.05)'; 
            ctx.lineWidth = 1;
            let bgOffsetX = (camera.x * 0.5) % TILE_SIZE; let bgOffsetY = (camera.y * 0.5) % TILE_SIZE;
            for(let x = -bgOffsetX; x < canvasW + TILE_SIZE; x += TILE_SIZE) { ctx.beginPath(); ctx.moveTo(camera.x + x, camera.y); ctx.lineTo(camera.x + x, camera.y + canvasH); ctx.stroke(); }
            for(let y = -bgOffsetY; y < canvasH + TILE_SIZE; y += TILE_SIZE) { 
                ctx.beginPath(); 
                ctx.moveTo(camera.x, camera.y + y); 
                ctx.lineTo(camera.x + canvasW, camera.y + y); 
                ctx.stroke(); 
            }
        }

        for (let y = 0; y < mapRows; y++) {
            for (let x = 0; x < mapCols; x++) {
                let px = x * TILE_SIZE, py = y * TILE_SIZE;
                if (px > camera.x - TILE_SIZE && px < camera.x + canvasW + TILE_SIZE && py > camera.y - TILE_SIZE && py < camera.y + canvasH + TILE_SIZE) drawTile(x, y, map[y][x].type);
            }
        }
        
        enemies.forEach(e => {
            let px = e.visualX * TILE_SIZE + TILE_SIZE/2, py = e.visualY * TILE_SIZE + TILE_SIZE/2;
            ctx.shadowBlur = 0; ctx.shadowColor = '#ff003c'; ctx.fillStyle = '#ff003c'; ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI*2); ctx.fill();
        });
        
        if(puzzleState.hasMirror) drawSnakeData(mirrorSnake, '#aa00ff', '#ff00ea');
        if(puzzleState.hasTwin && !twinSnake.escaped) drawSnakeData(twinSnake, '#ff8800', '#ffaa00');
        if(!snake.escaped) drawSnakeData(snake, '#00f3ff', '#00f3ff');
        
        particles.forEach(p => {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color; 
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0; ctx.restore();

        if(puzzleState.darkness) {
            let t = isMoving ? moveProgress / moveDuration : 1;
            let sx = !snake.escaped ? (snake[0].oldX !== undefined ? snake[0].oldX + (snake[0].x - snake[0].oldX)*t : snake[0].x) : 0;
            let sy = !snake.escaped ? (snake[0].oldY !== undefined ? snake[0].oldY + (snake[0].y - snake[0].oldY)*t : snake[0].y) : 0;
            let hx = sx*TILE_SIZE+TILE_SIZE/2-camera.x, hy = sy*TILE_SIZE+TILE_SIZE/2-camera.y;
            
            let gradient = ctx.createRadialGradient(hx, hy, 40, hx, hy, 250);
            gradient.addColorStop(0, 'rgba(5,5,8,0)'); gradient.addColorStop(1, 'rgba(5,5,10,0.98)');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvasW, canvasH);
        }
    }

    function loop(timestamp) {
        let dt = timestamp - lastTime; lastTime = timestamp; if(dt > 100) dt = 100;
        update(dt); draw(); requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
};
</script>
</body>
