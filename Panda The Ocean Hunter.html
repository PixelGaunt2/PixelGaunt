<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Panda the Ocean Hunter</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
    
    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #111; overflow: hidden;
        font-family: 'Fredoka One', cursive, sans-serif;
        touch-action: none;
        user-select: none;
        cursor: default;
    }
    
    body.battle-mode { cursor: none; }

    #gameCanvas { display: block; width: 100%; height: 100%; }

    #ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; display: flex; flex-direction: column;
        justify-content: space-between;
    }

    .hud-top {
        display: flex; justify-content: space-between; padding: 20px;
        color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        font-size: 28px;
    }

    .health-bar-container {
        width: 250px; height: 30px; background: rgba(0,0,0,0.5);
        border: 3px solid white; border-radius: 15px; overflow: hidden;
        box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    #health-bar {
        width: 100%; height: 100%; background: linear-gradient(90deg, #ff3b30, #ff9500);
        transition: width 0.2s ease-out;
    }

    .coin-display { display: flex; align-items: center; gap: 10px; color: #ffd700; font-size: 32px;}

    .menu {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; pointer-events: auto; opacity: 0;
        transition: opacity 0.3s; transform: scale(0.9); z-index: 10;
    }
    .menu.active { opacity: 1; transform: scale(1); }

    .menu h1 { color: #fff; font-size: 60px; margin-bottom: 10px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); text-align: center;}
    .menu p { color: #ccc; font-size: 22px; margin-bottom: 30px; text-align: center; max-width: 600px;}
    
    .btn {
        background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
        border: 4px solid #fff; border-radius: 30px; padding: 15px 50px;
        font-size: 26px; color: white; cursor: pointer; font-family: 'Fredoka One', cursive;
        margin: 10px; box-shadow: 0 8px 15px rgba(0,0,0,0.3); transition: transform 0.1s;
    }
    .btn:hover { transform: scale(1.05); }
    .btn:active { transform: scale(0.95); }
    
    .btn.shop { background: linear-gradient(180deg, #f6d365 0%, #fda085 100%); }
    .btn.danger { background: linear-gradient(180deg, #f5576c 0%, #f093fb 100%); }
    
    .shop-grid { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;}
    .shop-item {
        background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 15px;
        padding: 20px; text-align: center; color: white; width: 180px;
    }
    .shop-item h3 { margin: 0 0 10px 0; color: #ffd700; font-size: 24px;}
    
    #notification {
        position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
        color: #fff; font-size: 35px; text-shadow: 3px 3px 0 #000;
        pointer-events: none; opacity: 0; transition: opacity 0.2s; text-align: center;
        z-index: 5;
    }
    
    #boss-hp-container {
        display: none; position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
        width: 400px; text-align: center; color: white; font-size: 24px; text-shadow: 2px 2px 0 #000;
    }
    #boss-bar-bg {
        width: 100%; height: 20px; background: rgba(0,0,0,0.8); border: 2px solid white; border-radius: 10px; margin-top: 5px; overflow: hidden;
    }
    #boss-bar-fill { width: 100%; height: 100%; background: #9b59b6; transition: width 0.1s; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-layer">
    <div class="hud-top" id="hud" style="display: none;">
        <div>
            <div style="font-size: 18px; margin-bottom: 5px;">PANDA HP</div>
            <div class="health-bar-container"><div id="health-bar"></div></div>
        </div>
        <div class="coin-display">
            💰 <span id="coin-count">0</span>
        </div>
    </div>
    <div id="notification">Great Catch!</div>
    
    <div id="boss-hp-container">
        GIANT OCTOPUS BOSS
        <div id="boss-bar-bg"><div id="boss-bar-fill"></div></div>
    </div>
</div>

<div id="menu-main" class="menu active">
    <h1>Panda the Ocean Hunter</h1>
    <p>Catch sea creatures and put them in your basket!<br>Aim your HUGE GUN at mutants & Bosses!</p>
    <button class="btn" onclick="startGame()">Play Now</button>
    <button class="btn shop" onclick="openShop()">Upgrades Shop</button>
</div>

<div id="menu-shop" class="menu" style="display:none;">
    <h1>Upgrades</h1>
    <div class="coin-display" style="font-size:40px; margin-bottom:20px;">
        💰 <span id="shop-coins">0</span>
    </div>
    <div class="shop-grid">
        <div class="shop-item">
            <h3>Pro Rod</h3>
            <p>Bada Catch Bar.</p>
            <button class="btn shop" style="font-size: 18px; padding: 10px;" onclick="buyUpgrade('rod', 50)" id="btn-upg-rod">50 Coins</button>
        </div>
        <div class="shop-item">
            <h3>Armor Vest</h3>
            <p>Damage kam.</p>
            <button class="btn shop" style="font-size: 18px; padding: 10px;" onclick="buyUpgrade('armor', 100)" id="btn-upg-armor">100 Coins</button>
        </div>
        <div class="shop-item">
            <h3>Golden Lure</h3>
            <p>Rare & Boss Fish.</p>
            <button class="btn shop" style="font-size: 18px; padding: 10px;" onclick="buyUpgrade('lure', 200)" id="btn-upg-lure">200 Coins</button>
        </div>
    </div>
    <button class="btn danger" onclick="closeShop()">Back to Menu</button>
</div>

<div id="menu-pause" class="menu" style="display:none;">
    <h1 id="pause-title">Paused</h1>
    <button class="btn" onclick="resumeGame()" id="btn-resume">Resume</button>
    <button class="btn danger" onclick="toMainMenu()">Quit to Menu</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;

const STATE = { MENU: 0, IDLE: 1, CASTING: 2, WAITING: 3, HOOKED: 4, BATTLE: 5, PAUSED: 6, GAMEOVER: 7 };
let gameState = STATE.MENU;
let time = 0, lastTime = 0, shakeTime = 0, shakeMag = 0, slowMo = 1.0, dayTime = 0;

let player = { coins: 0, hp: 100, maxHp: 100, upgrades: { rod: 0, armor: 0, lure: 0 } };
const keys = {}; const mouse = { x: 0, y: 0, down: false, click: false };

let particles = [], fishes = [], floatingTexts = [], weatherParticles = [], bulletTrails = [], bubbles = [];
let bobber = { x: 0, y: 0, active: false, targetY: 0 };
let fishProgress = 10, hookedFish = null, fishPos = 50, fishTarget = 50, barPos = 10, moveTimer = 0;
let battleTimer = 0, battleTarget = null;

const AudioContext = window.AudioContext || window.webkitAudioContext;
const actx = new AudioContext();

function playSound(type) {
    if (actx.state === 'suspended') actx.resume();
    const osc = actx.createOscillator(); const gain = actx.createGain();
    osc.connect(gain); gain.connect(actx.destination); const now = actx.currentTime;
    
    if (type === 'cast') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
        gain.gain.setValueAtTime(0.5, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'splash') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(50, now + 0.2);
        gain.gain.setValueAtTime(0.5, now); gain.gain.linearRampToValueAtTime(0, now + 0.2); osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'bite') {
        osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1);
    } else if (type === 'shoot') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.2);
        gain.gain.setValueAtTime(1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'hit') {
        osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.exponentialRampToValueAtTime(20, now + 0.2);
        gain.gain.setValueAtTime(0.8, now); gain.gain.linearRampToValueAtTime(0, now + 0.2); osc.start(now); osc.stop(now + 0.2);
    } else if (type === 'coin') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, now); osc.frequency.setValueAtTime(1600, now + 0.1);
        gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'hurt') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
        gain.gain.setValueAtTime(0.8, now); gain.gain.linearRampToValueAtTime(0, now + 0.3); osc.start(now); osc.stop(now + 0.3);
    }
}

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();
window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === 'Escape' && gameState !== STATE.MENU) { if (gameState === STATE.PAUSED) resumeGame(); else pauseGame(); } });
window.addEventListener('keyup', e => keys[e.key] = false);
canvas.addEventListener('mousedown', e => { mouse.down = true; mouse.click = true; mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mouseup', () => { mouse.down = false; });
canvas.addEventListener('touchstart', e => { mouse.down = true; mouse.click = true; mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
canvas.addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
window.addEventListener('touchend', () => { mouse.down = false; });

function saveData() { localStorage.setItem('pandaFishSave', JSON.stringify(player)); }
function loadData() { const saved = localStorage.getItem('pandaFishSave'); if (saved) { let p = JSON.parse(saved); player.coins = p.coins || 0; player.upgrades = p.upgrades || { rod: 0, armor: 0, lure: 0 }; } }
loadData();

function hideAllMenus() { document.querySelectorAll('.menu').forEach(m => { m.classList.remove('active'); m.style.display = 'none'; }); }
function showMenu(id) { hideAllMenus(); let m = document.getElementById(id); if(m) { m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 10); } }

function startGame() { if(actx.state === 'suspended') actx.resume(); hideAllMenus(); document.getElementById('hud').style.display = 'flex'; player.hp = player.maxHp; updateHUD(); gameState = STATE.IDLE; fishes = []; spawnFish(8); document.body.classList.remove('battle-mode'); }
function openShop() { if(actx.state === 'suspended') actx.resume(); showMenu('menu-shop'); document.getElementById('shop-coins').innerText = player.coins; document.getElementById('btn-upg-rod').innerText = player.upgrades.rod ? "Maxed" : "50 Coins"; document.getElementById('btn-upg-armor').innerText = player.upgrades.armor ? "Maxed" : "100 Coins"; document.getElementById('btn-upg-lure').innerText = player.upgrades.lure ? "Maxed" : "200 Coins"; }
function closeShop() { showMenu('menu-main'); }
function buyUpgrade(type, cost) { if (player.upgrades[type] === 0 && player.coins >= cost) { player.coins -= cost; player.upgrades[type] = 1; saveData(); playSound('coin'); openShop(); } }
function pauseGame() { gameState = STATE.PAUSED; document.getElementById('pause-title').innerText = "Paused"; document.getElementById('btn-resume').style.display = "block"; showMenu('menu-pause'); document.body.classList.remove('battle-mode'); }
function resumeGame() { hideAllMenus(); gameState = STATE.IDLE; if (bobber.active) gameState = STATE.WAITING; if(gameState===STATE.BATTLE) document.body.classList.add('battle-mode'); }
function toMainMenu() { document.getElementById('hud').style.display = 'none'; showMenu('menu-main'); gameState = STATE.MENU; document.body.classList.remove('battle-mode'); }
function triggerGameOver() { gameState = STATE.GAMEOVER; document.getElementById('pause-title').innerText = "Knocked Out!"; document.getElementById('btn-resume').style.display = "none"; showMenu('menu-pause'); document.body.classList.remove('battle-mode'); }

function updateHUD() { document.getElementById('health-bar').style.width = (player.hp / player.maxHp * 100) + '%'; document.getElementById('coin-count').innerText = player.coins; }
function showNotification(text, color="#fff") { let n = document.getElementById('notification'); n.innerText = text; n.style.color = color; n.style.opacity = 1; setTimeout(() => n.style.opacity = 0, 2000); }
function screenshake(mag, duration) { shakeMag = mag; shakeTime = duration; }

function spawnParticles(x, y, color, count, speed=1, gravity=true) {
    for(let i=0; i<count; i++) { particles.push({ x: x, y: y, vx: (Math.random()-0.5)*15*speed, vy: (Math.random()-0.5)*15*speed - (gravity?5:0), life: 1.0, decay: Math.random()*0.03 + 0.02, color: color, size: Math.random()*6 + 3, g: gravity }); }
}
function spawnText(x, y, text, color) { floatingTexts.push({ x: x, y: y, text: text, color: color, life: 1.0, vy: -2 }); }

class Fish {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.baseY = y; this.type = type; 
        this.vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() + 0.5); this.vy = 0;
        this.tossProgress = 0;
        
        if (type === 4) { 
            this.size = 60; this.color = '#9b59b6'; this.hp = 3; this.maxHp = 3; this.value = 300; this.difficulty = 4; this.name = "BOSS OCTOPUS"; this.z = 100;
        } else if (type === 2) { 
            this.size = 30; this.color = '#ff3b30'; this.hp = 1; this.maxHp = 1; this.value = 50; this.difficulty = 3; this.name = "Mutant Fish"; this.z = 90;
        } else if (type === 5) { 
            this.size = 20; this.color = '#ff4757'; this.value = 25; this.difficulty = 1.5; this.name = "Crab"; this.z = 10;
        } else if (type === 6) { 
            this.size = 25; this.color = 'rgba(255, 150, 200, 0.8)'; this.value = 30; this.difficulty = 1.8; this.name = "Jellyfish"; this.z = 40;
        } else if (type === 7) { 
            this.size = 15; this.color = '#2ed573'; this.value = 40; this.difficulty = 2.8; this.name = "Sea Snake"; this.vx *= 1.5; this.z = 60;
        } else if (type === 8) { 
            this.size = 25; this.color = '#3742fa'; this.value = 45; this.difficulty = 2.5; this.name = "Baby Octopus"; this.z = 45;
        } else { 
            this.size = type === 1 ? 40 : (type === 3 ? 20 : 25);
            this.color = type === 0 ? '#4facfe' : type === 1 ? '#808080' : '#ffd700';
            this.difficulty = type === 1 ? 2.5 : type === 3 ? 2 : 1.2;
            this.value = type === 1 ? 20 : type === 3 ? 100 : 10;
            this.name = type === 1 ? "Heavy Fish" : type === 3 ? "Golden Fish" : "Normal Fish";
            this.z = 50;
        }
        this.state = 'wander';
    }
    update(dt) {
        if (this.state === 'tossed') {
            this.tossProgress += dt * 1.5; 
            
            if (this.tossProgress >= 1) {
                let idx = fishes.indexOf(this);
                if(idx !== -1) fishes.splice(idx, 1);
                spawnFish(1);
                playSound('splash');
                return;
            }
            
            let targetX = (W * 0.15) - 60; // Basket position X
            let targetY = (H / 2) + 30;    // Basket position Y
            
            this.x = this.tossStartX + (targetX - this.tossStartX) * this.tossProgress;
            let linearY = this.tossStartY + (targetY - this.tossStartY) * this.tossProgress;
            let arcHeight = 150;
            this.y = linearY - Math.sin(this.tossProgress * Math.PI) * arcHeight;
            return;
        }

        if (this.state === 'wander') {
            this.x += this.vx * dt * 60; 
            
            let minX = W * 0.35 + 30; let maxX = W + 40; 
            if (this.x < minX) { this.x = minX; this.vx = Math.abs(this.vx) || 1; } 
            else if (this.x > maxX) { this.x = maxX; this.vx = -Math.abs(this.vx) || -1; }
            
            let waterSurfaceY = H/2 + 60; let oceanBottomY = H - 30;
            
            if (this.type === 5) { 
                this.y = oceanBottomY; 
            } else if (this.type === 6) { 
                this.y += Math.sin(time * 3) * 0.5;
            } else if (this.type === 7) { 
                this.y = this.baseY + Math.sin(time * 8 + this.x * 0.05) * 15;
            } else { 
                this.y += Math.sin(time * 2 + this.x * 0.01) * 0.5;
            }

            if (this.type !== 5) {
                if (this.y < waterSurfaceY) this.y = waterSurfaceY;
                if (this.y > oceanBottomY) this.y = oceanBottomY; 
                if (this.type === 7) {
                    if (this.baseY < waterSurfaceY) this.baseY = waterSurfaceY;
                    if (this.baseY > oceanBottomY) this.baseY = oceanBottomY;
                }
            }
            
            if (gameState === STATE.WAITING && bobber.active) {
                let dist = Math.hypot(this.x - bobber.x, this.y - bobber.y);
                let attractionRadius = player.upgrades.lure ? 350 : 200;
                if (dist < attractionRadius && Math.random() < 0.01) this.state = 'approach';
            }
        } else if (this.state === 'approach') {
            if (!bobber.active) { this.state = 'wander'; return; }
            let dx = bobber.x - this.x, dy = bobber.y - this.y;
            let dist = Math.hypot(dx, dy);
            this.x += (dx/dist) * 2 * dt * 60; this.y += (dy/dist) * 2 * dt * 60;
            
            if (dist < 10) {
                this.state = 'hooked'; hookedFish = this;
                playSound('bite'); spawnParticles(this.x, this.y, '#fff', 20);
                
                if (this.type === 2 || this.type === 4) {
                    gameState = STATE.BATTLE; slowMo = this.type === 4 ? 0.1 : 0.15;
                    battleTimer = this.type === 4 ? 4.0 : 2.0; 
                    this.state = 'jump'; battleTarget = this;
                    document.body.classList.add('battle-mode'); playSound('splash'); 
                    if (this.type === 4) {
                        showNotification("GIANT OCTOPUS BOSS!", "#9b59b6");
                        document.getElementById('boss-hp-container').style.display = 'block';
                        document.getElementById('boss-bar-fill').style.width = '100%';
                    } else { showNotification("MUTANT ATTACK!", "#ff3b30"); }
                } else {
                    gameState = STATE.HOOKED; fishProgress = 15; fishPos = 50; barPos = 10; fishTarget = 50; moveTimer = 0; screenshake(5, 0.2);
                }
            }
        } else if (this.state === 'jump') {
            let pX = W * 0.15; let pY = H/2 + 20;
            this.x += (pX - this.x) * dt * (this.type === 4 ? 1.5 : 2); 
            this.y += (pY - this.y) * dt * (this.type === 4 ? 1.5 : 2);
        }
    }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        
        let jumpAngle = (this.state === 'jump') ? Math.atan2(H/2+20 - this.y, W*0.15 - this.x) : 0;
        
        if (this.state === 'tossed') {
            ctx.rotate(time * 15);
        }

        if (this.type === 4 || this.type === 8) { 
            if (this.state === 'jump') ctx.rotate(jumpAngle + Math.PI/2);
            if (this.vx < 0 && this.state === 'wander') ctx.scale(-1, 1);

            ctx.fillStyle = this.color;
            for (let i = -2; i <= 2; i++) {
                ctx.beginPath(); ctx.moveTo(i * (this.size/4), 5);
                ctx.quadraticCurveTo(i * (this.size/3) + Math.sin(time*10+i)*(this.size/4), this.size*0.8, i * (this.size/4) + Math.sin(time*10+i)*(this.size/6), this.size);
                ctx.lineWidth = this.size/5; ctx.strokeStyle = this.color; ctx.lineCap = 'round'; ctx.stroke();
            }
            ctx.beginPath(); ctx.arc(0, -this.size/6, this.size*0.7, Math.PI, 0); 
            ctx.lineTo(this.size*0.7, this.size/4); ctx.lineTo(-this.size*0.7, this.size/4); ctx.fill();

            if (this.type === 4) { 
                ctx.fillStyle = '#ffcc00'; ctx.beginPath(); ctx.arc(-15, -15, 10, 0, Math.PI*2); ctx.arc(15, -15, 10, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-15, -15, 4, 0, Math.PI*2); ctx.arc(15, -15, 4, 0, Math.PI*2); ctx.fill();
                ctx.lineWidth = 4; ctx.strokeStyle = '#000';
                ctx.beginPath(); ctx.moveTo(-30, -30); ctx.lineTo(-10, -20); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(30, -30); ctx.lineTo(10, -20); ctx.stroke();
            } else { 
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-8, -5, 6, 0, Math.PI*2); ctx.arc(8, -5, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-8, -5, 2, 0, Math.PI*2); ctx.arc(8, -5, 2, 0, Math.PI*2); ctx.fill();
            }
            
        } else if (this.type === 5) { 
            if (this.vx > 0) ctx.scale(-1, 1);
            ctx.strokeStyle = this.color; ctx.lineWidth = 3;
            let legWag = Math.sin(time * 15) * 5;
            for(let i=-1; i<=1; i+=2) {
                ctx.beginPath(); ctx.moveTo(i*10, 5); ctx.lineTo(i*20, 15 + legWag); ctx.lineTo(i*25, 20); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(i*5, 5); ctx.lineTo(i*15, 18 - legWag); ctx.stroke();
            }
            ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, 15, Math.PI, 0); ctx.fill();
            ctx.beginPath(); ctx.arc(-18, -10, 6, 0, Math.PI); ctx.fill();
            ctx.beginPath(); ctx.arc(18, -10, 6, 0, Math.PI); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-5, -12, 3, 0, Math.PI*2); ctx.arc(5, -12, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-5, -12, 1, 0, Math.PI*2); ctx.arc(5, -12, 1, 0, Math.PI*2); ctx.fill();

        } else if (this.type === 6) { 
            ctx.scale(1, 1 + Math.sin(time * 8) * 0.15);
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(0, 0, 15, Math.PI, 0); ctx.fill();
            ctx.strokeStyle = this.color; ctx.lineWidth = 2;
            for(let i=-10; i<=10; i+=5) {
                ctx.beginPath(); ctx.moveTo(i, 0); 
                ctx.quadraticCurveTo(i+Math.sin(time*5)*5, 10, i, 20); ctx.stroke();
            }
        } else if (this.type === 7) { 
            if (this.vx < 0) ctx.scale(-1, 1);
            ctx.strokeStyle = this.color; ctx.lineWidth = 8; ctx.lineCap = 'round';
            ctx.beginPath();
            for(let i=0; i<40; i+=5) { ctx.lineTo(-i, Math.sin(time*15 + i*0.2)*5); }
            ctx.stroke();
            ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(2, -2, 2, 0, Math.PI*2); ctx.fill();

        } else { 
            if (this.vx < 0 && this.state === 'wander') ctx.scale(-1, 1);
            if (this.state === 'jump') ctx.rotate(jumpAngle);

            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.ellipse(0, 0, this.size, this.size*0.6, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.save();
            ctx.translate(-this.size + 5, 0);
            ctx.rotate(Math.sin(time * 20) * 0.3); 
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-20, -15); ctx.lineTo(-20, 15); ctx.fill();
            ctx.restore();

            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.size*0.5, -this.size*0.2, this.size*0.2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(this.size*0.6, -this.size*0.2, this.size*0.1, 0, Math.PI*2); ctx.fill();

            if (this.type === 2) {
                ctx.fillStyle = '#fff'; ctx.beginPath();
                ctx.moveTo(this.size*0.8, this.size*0.1); ctx.lineTo(this.size*0.9, this.size*0.3); ctx.lineTo(this.size*0.7, this.size*0.2); ctx.fill();
            }
            if (this.type === 3) {
                ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 20; ctx.strokeStyle = '#fff'; ctx.stroke();
            }
        }
        ctx.restore();
    }
}

function spawnFish(count) {
    for(let i=0; i<count; i++) {
        let type = 0; let r = Math.random();
        let bossChance = player.upgrades.lure ? 0.08 : 0.03;
        
        if (r < bossChance) type = 4; 
        else if (r < 0.15) type = 3; 
        else if (r < 0.30) type = 2; 
        else if (r < 0.40) type = 1; 
        else if (r < 0.50) type = 5; 
        else if (r < 0.65) type = 6; 
        else if (r < 0.75) type = 7; 
        else if (r < 0.85) type = 8; 
        else type = 0; 
        
        let minX = W * 0.35 + 50;
        let fishX = minX + Math.random()*(W - minX);
        let minY = H/2 + 70;
        let maxY = H - 50;
        let fishY = minY + Math.random()*(maxY - minY);
        fishes.push(new Fish(fishX, fishY, type));
    }
}

function drawBackground() {
    let skyTop = dayTime > 0.5 ? '#001133' : '#87CEEB';
    let skyBot = dayTime > 0.5 ? '#112244' : '#E0F6FF';
    let grd = ctx.createLinearGradient(0, 0, 0, H/2);
    grd.addColorStop(0, skyTop); grd.addColorStop(1, skyBot);
    ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = dayTime > 0.5 ? '#FFF' : '#FFDF00';
    let sunX = (dayTime * 2 % 1) * W;
    ctx.beginPath(); ctx.arc(sunX, 100, 40, 0, Math.PI*2); ctx.fill();
    if (dayTime > 0.5) { ctx.shadowColor = '#FFF'; ctx.shadowBlur = 20; ctx.fill(); ctx.shadowBlur = 0; }

    ctx.fillStyle = dayTime > 0.5 ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.8)';
    for(let i=0; i<5; i++) {
        let cx = ((time*10 + i*200) % (W+200)) - 100;
        ctx.beginPath(); ctx.arc(cx, 150 + Math.sin(i)*50, 30, 0, Math.PI*2);
        ctx.arc(cx+30, 140 + Math.sin(i)*50, 40, 0, Math.PI*2);
        ctx.arc(cx+60, 150 + Math.sin(i)*50, 30, 0, Math.PI*2); ctx.fill();
    }

    let waterGrd = ctx.createLinearGradient(0, H/2, 0, H);
    waterGrd.addColorStop(0, dayTime > 0.5 ? '#003366' : '#00b4db'); 
    waterGrd.addColorStop(1, dayTime > 0.5 ? '#001133' : '#0083b0'); 
    ctx.fillStyle = waterGrd;
    
    ctx.beginPath();
    ctx.moveTo(0, H);
    for(let i=0; i<=W; i+=50) { ctx.lineTo(i, H/2 + 20 + Math.sin(time*2 + i*0.02) * 10); }
    ctx.lineTo(W, H); ctx.fill();

    ctx.fillStyle = dayTime > 0.5 ? '#6a8d73' : '#c2e59c'; 
    ctx.beginPath(); ctx.moveTo(0, H/2 - 20); ctx.lineTo(W * 0.25, H/2 - 10); 
    ctx.quadraticCurveTo(W * 0.35, H/2 + 50, W * 0.3, H); ctx.lineTo(0, H); ctx.fill();

    ctx.fillStyle = '#e9c46a';
    ctx.beginPath(); ctx.moveTo(W * 0.25, H/2 - 10); ctx.quadraticCurveTo(W * 0.38, H/2 + 50, W * 0.32, H);
    ctx.lineTo(W * 0.28, H); ctx.quadraticCurveTo(W * 0.34, H/2 + 50, W * 0.23, H/2 - 10); ctx.fill();
    
    ctx.fillStyle = '#d4a373';
    ctx.fillRect(W*0.28, H - 20, W, 20);
}

    ctx.beginPath(); ctx.ellipse(0, -20, 28, 8, 0, Math.PI, Math.PI*2); ctx.fill();

function drawUI() {
    if (gameState === STATE.HOOKED) {
        let barW = 35; let barH = 320;
        let bX = W - 120; let bY = H/2 - 160;
        
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(bX, bY, barW, barH);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.strokeRect(bX, bY, barW, barH);

        let catchSizePercent = player.upgrades.rod ? 40 : 25; 
        let catchHeight = (catchSizePercent / 100) * barH;
        let catchY = bY + barH - (barPos / 100 * barH) - catchHeight;
        
        ctx.fillStyle = 'rgba(50, 255, 50, 0.6)'; ctx.fillRect(bX, catchY, barW, catchHeight);

        let fY = bY + barH - (fishPos / 100 * barH);
        ctx.fillStyle = '#ff3b30'; ctx.beginPath(); ctx.arc(bX + barW/2, fY, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.moveTo(bX+barW/2+14, fY); ctx.lineTo(bX+barW/2+24, fY-10); ctx.lineTo(bX+barW/2+24, fY+10); ctx.fill(); 

        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(bX - 35, bY, 20, barH);
        ctx.fillStyle = '#ffd700'; let progH = (fishProgress / 100) * barH;
        ctx.fillRect(bX - 35, bY + barH - progH, 20, progH);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(bX - 35, bY, 20, barH);
        
        ctx.fillStyle = '#fff'; ctx.font = '24px Fredoka One'; ctx.textAlign = 'right';
        ctx.fillText("HOLD = UP", bX - 55, bY + 40);
        ctx.fillText("RELEASE = DOWN", bX - 55, bY + 70);
        ctx.textAlign = 'left';
    }

    if (gameState === STATE.BATTLE) {
        let grd = ctx.createRadialGradient(W/2, H/2, H/4, W/2, H/2, H);
        grd.addColorStop(0, 'rgba(0,0,0,0)'); grd.addColorStop(1, 'rgba(255,0,0,0.4)');
        ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);
        
        ctx.strokeStyle = 'rgba(255, 200, 0, 0.8)'; ctx.lineWidth = 3;
        bulletTrails.forEach(bt => { ctx.beginPath(); ctx.moveTo(bt.startX, bt.startY); ctx.lineTo(bt.endX, bt.endY); ctx.stroke(); });

        let cx = mouse.x; let cy = mouse.y;
        let dist = Math.hypot(cx - battleTarget.x, cy - battleTarget.y);
        let onTarget = dist < (battleTarget.size + 20);
        
        ctx.strokeStyle = onTarget ? '#ff3b30' : '#00ff00'; ctx.lineWidth = 4;
        
        ctx.beginPath(); ctx.arc(cx, cy, 25, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = onTarget ? '#ff3b30' : '#00ff00';
        ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(cx - 40, cy); ctx.lineTo(cx - 15, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx + 15, cy); ctx.lineTo(cx + 40, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy - 40); ctx.lineTo(cx, cy - 15); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy + 15); ctx.lineTo(cx, cy + 40); ctx.stroke();
    }
}

function update(dt) {
    time += dt; dayTime = (dayTime + dt * 0.01) % 1; 
    if (shakeTime > 0) shakeTime -= dt;

    if (dayTime > 0.3 && dayTime < 0.6) {
        if (Math.random() < 0.3) weatherParticles.push({x: Math.random()*W, y: -20, vy: 15+Math.random()*5});
    }
    for (let i=weatherParticles.length-1; i>=0; i--) {
        let p = weatherParticles[i]; p.y += p.vy * dt * 60; p.x -= dt * 100;
        if (p.y > H) weatherParticles.splice(i, 1);
    }
    
    if (Math.random() < 0.1) {
        bubbles.push({ x: W*0.35 + Math.random()*(W*0.65), y: H, radius: Math.random()*4+2, speed: Math.random()*2+1 });
    }
    for(let i=bubbles.length-1; i>=0; i--) {
        let b = bubbles[i]; b.y -= b.speed * dt * 60; b.x += Math.sin(time*2 + b.y*0.05)*1;
        if (b.y < H/2 + 20) bubbles.splice(i, 1);
    }

    for(let i=bulletTrails.length-1; i>=0; i--) { bulletTrails[i].life -= dt * 10; if(bulletTrails[i].life <= 0) bulletTrails.splice(i, 1); }

    let pandaX = W * 0.15; let pandaY = H/2 + 20;

    if (gameState === STATE.IDLE) {
        if (mouse.click) {
            gameState = STATE.CASTING; bobber.active = true;
            bobber.x = pandaX + 120; bobber.y = pandaY - 100; bobber.targetY = mouse.y;
            let targetX = mouse.x; if (targetX < W * 0.35) targetX = W * 0.4; 
            if (bobber.targetY < H/2 + 50) bobber.targetY = H/2 + 50; 
            bobber.vx = (targetX - bobber.x) * 2; bobber.vy = (bobber.targetY - bobber.y) * 2;
            playSound('cast'); mouse.click = false;
        }
    }
    else if (gameState === STATE.CASTING) {
        bobber.x += bobber.vx * dt; bobber.y += bobber.vy * dt;
        if (Math.abs(bobber.y - bobber.targetY) < 10) {
            gameState = STATE.WAITING; playSound('splash'); spawnParticles(bobber.x, bobber.y, '#fff', 15);
        }
    }
    else if (gameState === STATE.WAITING) {
        bobber.y += Math.sin(time*5) * 0.5;
        if (mouse.click && mouse.y < H/2) { gameState = STATE.IDLE; bobber.active = false; mouse.click = false; }
    }
    else if (gameState === STATE.HOOKED) {
        let f = hookedFish;
        if (mouse.down) barPos += 50 * dt; else barPos -= 50 * dt;
        let catchSizePercent = player.upgrades.rod ? 40 : 25;
        barPos = Math.max(0, Math.min(100 - catchSizePercent, barPos));

        moveTimer -= dt;
        if (moveTimer <= 0) { moveTimer = Math.random() * 1.0 + 0.5; fishTarget = Math.random() * 100; }
        let fishSpeed = f.difficulty * 25; 
        if (fishPos < fishTarget) fishPos += fishSpeed * dt;
        if (fishPos > fishTarget) fishPos -= fishSpeed * dt;
        fishPos = Math.max(0, Math.min(100, fishPos));

        if (fishPos >= barPos && fishPos <= barPos + catchSizePercent) {
            fishProgress += 20 * dt; bobber.x -= 20 * dt; f.x = bobber.x; f.y = bobber.y;
        } else { fishProgress -= 15 * dt; }
        
        if (fishProgress >= 100) {
            f.state = 'tossed';
            f.tossStartX = f.x;
            f.tossStartY = f.y;
            f.tossProgress = 0;
            
            player.coins += f.value; saveData(); updateHUD();
            showNotification(`${f.name}! +${f.value}`, '#ffd700'); playSound('coin');
            spawnParticles(bobber.x, bobber.y, '#ffd700', 30); spawnText(bobber.x, bobber.y - 50, `+${f.value}`, '#ffd700');
            
            gameState = STATE.IDLE; bobber.active = false; hookedFish = null;
        }
        if (fishProgress <= 0) {
            showNotification("Escaped...", "#808080"); playSound('splash');
            f.state = 'wander'; gameState = STATE.IDLE; bobber.active = false; hookedFish = null;
        }
    }
    else if (gameState === STATE.BATTLE) {
        battleTimer -= dt / slowMo;
        
        if (mouse.click) {
            playSound('shoot'); screenshake(8, 0.1);
            let gunTipX = pandaX + 110; let gunTipY = pandaY;
            spawnParticles(gunTipX, gunTipY, '#ffa500', 15);
            bulletTrails.push({startX: gunTipX, startY: gunTipY, endX: mouse.x, endY: mouse.y, life: 1.0});
            mouse.click = false;
            
            let dist = Math.hypot(mouse.x - battleTarget.x, mouse.y - battleTarget.y);
            let hitRadius = battleTarget.type === 4 ? 80 : 50;

            if (dist < hitRadius) {
                playSound('hit'); spawnParticles(battleTarget.x, battleTarget.y, battleTarget.type===4 ? '#8e44ad' : '#ff3b30', 40);
                battleTarget.hp--;
                if (battleTarget.type === 4) { document.getElementById('boss-bar-fill').style.width = (battleTarget.hp / battleTarget.maxHp * 100) + '%'; }

                if (battleTarget.hp <= 0) {
                    playSound('coin'); spawnParticles(battleTarget.x, battleTarget.y, '#ffd700', 100);
                    let reward = battleTarget.value * 2; player.coins += reward; saveData(); updateHUD();
                    showNotification(battleTarget.type === 4 ? `BOSS DEFEATED! +${reward}` : `BOOM! +${reward} Coins`, '#ffd700');
                    fishes = fishes.filter(fish => fish !== battleTarget); spawnFish(1);
                    slowMo = 1.0; gameState = STATE.IDLE; bobber.active = false; battleTarget = null;
                    document.body.classList.remove('battle-mode'); document.getElementById('boss-hp-container').style.display = 'none';
                }
            }
        }
        
        if (battleTimer <= 0 && battleTarget) {
            screenshake(25, 0.5); playSound('hurt'); spawnParticles(pandaX, pandaY, '#ff3b30', 50);
            let dmg = battleTarget.type === 4 ? 45 : 30;
            if (player.upgrades.armor) dmg = Math.floor(dmg / 2);
            player.hp -= dmg; updateHUD();
            
            if (player.hp <= 0) triggerGameOver();
            else {
                showNotification(battleTarget.type === 4 ? "BOSS SMASH!" : "Ouch!", "#ff3b30"); 
                slowMo = 1.0; gameState = STATE.IDLE; bobber.active = false; battleTarget.state = 'wander'; battleTarget = null;
                document.body.classList.remove('battle-mode'); document.getElementById('boss-hp-container').style.display = 'none';
            }
        }
    }

    fishes.forEach(f => f.update(dt * slowMo));
    for(let i=particles.length-1; i>=0; i--) { p = particles[i]; p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; if(p.g) p.vy += 0.5 * dt * 60; p.life -= p.decay * dt * 60; if (p.life <= 0) particles.splice(i, 1); }
    for(let i=floatingTexts.length-1; i>=0; i--) { t = floatingTexts[i]; t.y += t.vy * dt * 60; t.life -= 1 * dt; if (t.life <= 0) floatingTexts.splice(i, 1); }
    mouse.click = false;
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shakeTime > 0) ctx.translate((Math.random()-0.5)*shakeMag, (Math.random()-0.5)*shakeMag);

    drawBackground();

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    bubbles.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill(); });

    ctx.fillStyle = 'rgba(200,220,255,0.5)';
    weatherParticles.forEach(p => ctx.fillRect(p.x, p.y, 2, 10));

    drawBasket(W * 0.15 - 80, H/2 + 50);

    if (bobber.active && gameState !== STATE.HOOKED) {
        ctx.fillStyle = '#ff3b30'; ctx.beginPath(); ctx.arc(bobber.x, bobber.y, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bobber.x, bobber.y-4, 3, 0, Math.PI*2); ctx.fill();
    }

    fishes.sort((a,b) => (a.state === 'tossed' ? 1000 : a.z) - (b.state === 'tossed' ? 1000 : b.z)).forEach(f => f.draw());

    let pState = 'idle';
    if (gameState === STATE.CASTING || gameState === STATE.WAITING) pState = 'fishing';
    if (gameState === STATE.HOOKED) pState = 'pulling';
    if (gameState === STATE.BATTLE) pState = 'shooting'; 
    
    drawPandaAndChair(W * 0.15, H/2 + 20, pState);

    particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
    ctx.globalAlpha = 1.0;
    
    ctx.textAlign = 'center'; ctx.font = '28px Fredoka One';
    floatingTexts.forEach(t => { ctx.globalAlpha = t.life; ctx.fillStyle = '#000'; ctx.fillText(t.text, t.x+2, t.y+2); ctx.fillStyle = t.color; ctx.fillText(t.text, t.x, t.y); });
    ctx.globalAlpha = 1.0; ctx.textAlign = 'left';

    drawUI(); ctx.restore();
}

function loop(timestamp) {
    let dt = (timestamp - lastTime) / 1000; if (dt > 0.1) dt = 0.1; lastTime = timestamp;
    if (gameState !== STATE.MENU && gameState !== STATE.PAUSED && gameState !== STATE.GAMEOVER) update(dt);
    draw(); requestAnimationFrame(loop);
}

requestAnimationFrame(timestamp => { lastTime = timestamp; loop(timestamp); });
</script>
