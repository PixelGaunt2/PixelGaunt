<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelGaunt Studio - Free Browser Games</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121214; color: #fff; margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, #6200ea, #3700b3); padding: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 2.5rem; letter-spacing: 2px; }
        p { color: #bb86fc; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background-color: #1e1e24; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 16px rgba(0,0,0,0.3); transition: transform 0.3s; border: 1px solid #2e2e38; text-align: center; }
        .game-card:hover { transform: translateY(-5px); border-color: #bb86fc; }
        .game-thumb { width: 100%; height: 180px; background-color: #2e2e38; display: flex; align-items: center; justify-content: center; color: #666; font-size: 1.2rem; }
        .game-info { padding: 15px; }
        .game-title { font-size: 1.4rem; margin: 10px 0; color: #fff; }
        .btn-play { display: inline-block; background-color: #03dac6; color: #000; padding: 10px 25px; border-radius: 25px; text-decoration: none; font-weight: bold; margin-top: 10px; transition: background 0.2s; }
        .btn-play:hover { background-color: #01b09e; }
        footer { text-align: center; padding: 20px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>🎮 PixelGaunt Studio</h1>
        <p>Play Awesome Free Browser Games Instantly!</p>
    </header>

    <div class="container">
        <h2 style="border-bottom: 2px solid #3700b3; padding-bottom: 10px; margin-bottom: 30px;">Our Featured Games</h2>
        
        <div class="game-grid">
            <div class="game-card">
                <div class="game-thumb">🚀 Game 1 Banner/Image</div>
                <div class="game-info">
                    <div class="game-title">My First Space Game</div>
                    <a href="games/game1/index.html" class="btn-play">Play Now</a>
                </div>
            </div>

            <div class="game-card">
                <div class="game-thumb">🧱 Game 2 Banner/Image</div>
                <div class="game-info">
                    <div class="game-title">Puzzle Brick Crusher</div>
                    <a href="games/game2/index.html" class="btn-play">Play Now</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PixelGaunt Studio. Powered by GitHub Pages.</p>
    </footer>

</body>
</html>
